  - {type: variant, offset: 559, length: 1, content: 七, WYG: 四十分為日法又云自漢太初至于宋英宗時冬至差十日元史厯志授時厯議云自春秋獻公以來凡二千一百六十餘年用大衍宣明紀元統天大明授時六厯推筭冬至凡四}
