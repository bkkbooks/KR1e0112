  - {type: punctuation, offset: 1435, content: 、, id: KR1e0112_CHANT_001-bkkpn423}
  - {type: variant, offset: 1435, length: 260, content: 日日食以考晦朔以推時驗而見皆不然各據其學以推春秋此無異度已之跡而欲削佗人之足也余為歷論之後至咸寧中有善算者李修夏顯依歷體為術名乾度歷表上朝廷其術合日行四分之數而微增月行用三百歲改憲之章二元相推七十餘歲承以強弱強弱之差蓋少而適足以遠通盈縮時尚書史官以乾度歷與泰始歷參校古今記注乾度歷殊勝今其術具存時又并考古今十歷以驗春秋知三統歷之最疏也今具列其得失之數又據經傳微旨考日辰朔晦以相發明為經傳長歷如左諸經傳證據及失閏違時文字謬誤皆甄發之雖未必其得天蓋是春秋當時之歷也學者覽焉大凡經傳有七百七十九日三百九十三日經三百八十六日傳其, WYG: 惟}
