  - {type: variant, offset: 3, length: 1, content: 歷, WYG: 厯卷一右諭徳陳厚耀撰集證漢書律厯志節抄春秋殷厯皆以殷魯自周昭王以下亡年數故據周公伯禽以下為紀魯公伯禽即位四十六年至康王十六年而薨子考公酋立考公即位四年及煬公熈立及者兄弟相及非子繼父也下倣此煬公二十四年正月丙申朔旦冬至殷厯以為丁酉距微公七十六嵗煬公即位六十年元本十六年誤子幽公宰立幽公即位十四年及微公茀立微公二十六年正月乙亥朔旦冬至殷厯以為丙子距獻公七十六嵗微公即位五十年子厲公翟立厲公即位三十七年及獻公具立獻公十五年正月甲寅朔旦冬至殷厯以為乙卯距懿公七十六嵗獻公即位五十年子慎公埶立慎公即位三十年及武公敖立武公即位二年子懿公被立懿公九年正月癸巳朔旦冬至殷厯以為甲午距惠公七十六嵗懿公即位九年兄子柏御立柏御即位十一年叔父孝公稱立孝公即位二十七年子惠公弗皇立惠公三十八年正月壬申朔旦冬至殷厯以為癸酉距僖公七十六嵗惠公即位四十六年子隠公息立凡伯禽至春秋三百八十六年春秋隠公即位十一年及}
