  - {type: variant, offset: 142, length: 0, content: '', WYG: 推合丁巳朔前後漢及魏晉四代所記日食晦朔及先晦都合一百八十一今以甲子元厯術推之並合朔日而食前漢合有四十五食三食並先晦一日三十二食並皆晦日十食並是朔日後漢合有七十四食三十七食並皆晦日三十七食並皆朔日魏合有十四食四食並皆晦日十食並皆朔日晉合有四十八食二十五食並皆晦日二十三食並皆朔日第二勘度差變騐尚書云日短星昴以正仲冬即是唐堯時冬至之日日在危宿合昏之時昴正午案竹書紀年堯元年丙子今以甲子元厯術推筭得合堯時冬至日昏中昴星正午漢書武帝太初元年丁丑洛下閎等考定太初厯冬至日在牽牛初今以甲子元厯術筭即得斗末牛初矣晉姜岌以月食騐日度知冬至之日日在斗十七度宋文帝癸酉嵗何承天考騐乾度亦知冬至之日日在斗十七度至今隋開皇甲辰之嵗考定厯象以稽天道知冬至之日日在斗十三度第三勘氣影長騐春秋緯命厯序云魯僖公五年正月壬子朔旦冬至今以甲子元厯推筭得合不差宋元嘉十年何承天測景知冬至已差三日今厯推冬至之日恒與影長之日符合不差十七年張胄𤣥厯成奏之上付劉暉與國子助教王頗司厯劉宜援據古史影等駁胄𤣥云命厯序僖公五年天正壬子朔旦日至左氏𫝊僖公五年正月辛亥朔日南至張賔厯天正壬子朔冬至合命厯序差𫝊一日張胄𤣥厯天正壬子朔三日甲寅冬至差命厯序二日差𫝊三日成公十二年命厯序天正辛卯朔旦日至張賔厯天正辛卯朔冬至合命厯序張胄𤣥亦天正辛卯朔二日壬辰冬至差命厯序一日昭公二十年春秋左氏𫝊二月己丑朔日南至凖命厯序庚寅朔旦日至張賔厯天正庚寅朔冬至並合命厯序差𫝊一日張胄𤣥厯亦天正庚寅朔差𫝊一日二日辛卯冬至差命厯序一日差𫝊二日宜案命厯序及春秋左氏𫝊並閏餘盡之嵗皆須朔旦冬至若依命厯序勘春秋三十七食合處至多若依左𫝊合者至少是以知𫝊為錯今張胄𤣥信情置閏命厯序及𫝊氣朔並差又宋元嘉冬至影有七張賔厯合者五差者二亦在前一日張胄𤣥厯合者三差者四在後一日云云高祖令羣臣博議咸以胄𤣥為宻遂貶劉暉等胄𤣥所造厯法付有司施行唐書厯志大衍厯議曰大衍厯僧一行所造僖公五年正月辛亥朔日南至以周厯推之入壬子蔀第四章以辛亥一分合朔冬至殷厯則壬子蔀首也昭公二十年二月己丑朔日南至魯史失閏至不在正左氏記之以懲司厯之罪周厯得己丑二分殷厯得庚寅一分殷厯南至常在十月晦則中氣後天也周厯食朔差經或二日則合朔先天也𫝊所據者周厯也緯所據者殷厯也氣合于𫝊朔合于緯斯得之矣又命厯序以為孔子脩春秋用殷厯使其數可𫝊于後考其食朔不與殷厯合及開元十二年朔差五日矣氣差八日矣上不合于經下不足以𫝊于後代蓋哀平間治甲寅元厯者託之非古也又曰魯厯南至又先周厯四分之三而朔後九百四十分日之五十一朔後五十一分入第三章第九年二月故僖公五年辛亥為十二月晦壬子為正月朔又推日食宻于殷厯其以閏餘一為章首亦取合于當時也又曰日月合度謂之朔無所取之取之食也春秋日食有甲乙者三十四殷厯魯厯先一日者十三後一日者三周厯先一日者二十二先二日者九其偽可知矣莊公三十年九月庚午朔襄公二十一年九月庚戌朔定公五年三月辛亥朔當以盈縮遲速為定朔殷厯雖合適然耳非正也僖公五年正月辛亥朔十二月丙子朔十四年三月己丑朔文公元年五月辛酉朔十一年三月甲申晦襄公十九年五月壬辰晦昭公元年十二月甲辰朔二十年二月己丑朔二十三年正月壬寅朔七月戊辰晦皆與周厯合其所記多周齊晉事葢周王所頒齊晉用之僖公十五年九月己夘晦十六年正月戊申朔成公十六年六月甲午晦襄公十八年十月丙寅晦十一月丁卯朔二十六年三月甲寅朔二十七年六月丁未朔與殷厯魯厯合此非合食故仲尼因循時史而所記多宋魯事與齊晉不同可知矣昭公十二年十月壬申朔原輿人逐原伯絞與魯厯周厯皆差一日此丘明即其所聞書之也僖公二十二年十一月己巳朔宋楚戰于泓周殷魯厯皆先一日楚人所赴也昭公二十年六月丁巳晦衛侯與北宫喜盟七月戊午朔遂盟國人三厯皆先二日衞人所赴也此則列國之厯不可以一術齊矣而長厯日子不在其月則改易閏餘欲以求合故閏月相距近則十餘月逺或七十餘月此杜預所甚謬也夫合朔先天則經書日食以糾之中氣後天則傳書南至以明之其在晦二日則原乎定朔以得之列國之厯或殊則稽于六家之術以知之此四者皆治厯之大端而預所未曉故也又曰春秋日食}
