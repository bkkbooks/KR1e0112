  - {type: 'tls:seg', offset: 562, content: '', id: KR1e0112_CHANT_001-9a.3}
  - {type: variant, offset: 562, length: 2, content: 傳發, WYG: 事今按獻公十五年戊寅嵗正月甲寅朔旦冬至授時得甲寅統天得乙卯後天一日至僖公五年正月辛亥朔旦冬至授時統天皆得辛亥與天合下至昭公二十年己夘嵗正月己丑朔旦冬至授時統天皆得戊子並先一日若曲變其法以從之則獻公僖公皆不合矣以知春秋所書昭公冬至乃日度失行之騐也明鄭世子載堉曰授時厯議據前漢志魯獻公十五年戊寅嵗正月甲寅朔旦冬至引此為首葢獻公乃隠公五世祖下距隠公元年己未一百六十一年許郭諸儒豈不知獻公在春秋前甚逺哉第以所推昭公二十年冬至而得戊子既不能合偶與獻公合故援此而為之説云曲變其法以從昭公則與獻公不合遂謂春秋所書昭公冬至乃日度失行之騐然則大衍宣明諸厯推之皆得己丑豈皆誤耶夫獻公甲寅冬至别無所據惟劉歆三統厯是據耳左𫝊不足信而歆獨可信乎太初元年冬至在辛酉歆乃以為甲子差天三日尚不能知而能逆知上下數百年乎然則獻公十五年冬至當在何日曰三統授時之甲寅失之先紀元大明之丁巳失之後大衍所推丙辰宣明所推乙卯庶或近之然别無所考闕疑可也大凡春秋前後千載之間氣朔交食長厯大衍所推近是劉歆班固所説全非杜預一行已}
