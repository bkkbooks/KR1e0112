  - {type: variant, offset: 16867, length: 0, content: '', krp: 又記梓慎曰火出于夏為三月于商為四月于周為五月皆以周人改時改月春夏秋冬之序則循周正分至啓閉之候則仍夏時其經書冬十月雨雪春正月無氷二月無氷及冬十月隕霜殺菽之類皆為記災可知矣汲冢竹書有周月解亦曰夏數得天百王所同商以建丑為正亦越我周作正以垂三統至于敬授民時巡狩烝享猶自夏焉其言損益之意甚明經書春烝春狩夏蒐以此葢三正之義備矣而近代説者往往不然夫以左氏去聖人未逺終春秋二百四十二年以及戰國之際中國無改物之變魯未滅亡𫝊于當時正朔豈容有差而猶或有為異論者何也葢嘗考之曰殷周不改月者據商書言元祀十有二月而秦人以十月為嵗首也曰夏時冠周月者則疑建子非春而孔子嘗欲行夏之時也按太史公記三代革命于殷曰改正朔于周曰制正朔于秦曰改年始葢正謂正月朔謂月朔何氏公羊註曰夏以斗建寅之月為正}
  - {type: variant, offset: 16868, length: 0, content: '', WYG: 旦為朔殷以斗建丑之月為正雞鳴為朔周以斗建子之月為正夜半為朔是也殷周即所改之月為嵗首故曰改正朔曰制正朔秦即十月為嵗首而别用夏時數月故曰改年始其言之已詳漢書律厯志據三統厯商十二月乙丑朔旦冬至即書伊訓篇太甲元年十有二月乙丑伊尹祀于先王以冬至越茀行事其所引書辭並序皆與偽孔氏書伊訓篇語意不合且言日不言朔又不言即位則事在即位後矣凡新君即位必先朝廟見祖而後正君臣之禮今即位後未踰月復祠于先王以嗣王見祖此何禮也暨三祀十有二月朔奉嗣王歸于亳是日宜見祖而不見又何也所謂古文尚書者掇拾傅㑹不合不經葢如此説者乃欲按之以證殷周不改月可乎禮記孟獻子亦曰正月日至七月日至其説皆與𫝊合夫冬至在商之十二月在周之正月大寒在周之二月驚蟄在三月夏至在七月而太初厯立冬小雪于夏為十月商為十一月周為十二月唐人大衍厯追筭春秋冬至亦皆在正月孰謂春秋不改月乎陳寵云陽氣始萌有蘭射干芸荔之應天以為正周以為春陽氣上通雉雊雞乳地以為正殷以為春陽氣已至天地已交萬物皆正蟄蟲始振人以為正夏以為春葢天施于子地化于丑人生于寅三陽雖有微著三正皆可言春此亦厯家相承之説所謂夏數得天以其最適四時之中爾孰謂建子非春乎乃若夫子答顏子為邦之問則與作春秋事異葢春秋即當代之書以治當代之臣}
