  - {type: variant, offset: 16881, length: 0, content: '', WYG: 言劉向所總有黄帝顓頊夏殷周厯及魯厯為六厯自周昭王以下無世次故據周公伯禽以下為紀自煬公至緡公冬至殷厯每後一日則由厯家假魯君世次逆推周正交朔之合否因號魯厯非魯人所自為明矣宋書禮志又言六厯皆無推日食法但有考課疏宻而已是豈當代所嘗用者哉劉歆惑于襄哀𫝊文遂謂魯有司厯而杜氏因之謬矣然説者亦自病夏時周月}
