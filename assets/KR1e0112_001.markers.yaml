  - {type: variant, offset: 553, length: 1, content: 歷, WYG: 方夏后氏之初八月辰伏九月内火及霜降之後火已朝覿東方距春秋之季千五百餘年乃云火伏而後蟄者畢向使冬至常居其所則仲尼不得以西流未伏明是九月之初也自春秋至今又千五百嵗麟徳厯以霜降後五日日在氐八度房心初伏定増二日以月食衝校之猶差三度閏餘稍多則建亥之始火猶}
  - {type: variant, offset: 553, length: 1, content: 歷, krp: 方夏后氏之初八月辰伏九月内火及霜降之後火已朝覿東方距春秋之季千五百餘年乃云火伏而後蟄者畢向使冬至常居其所則仲尼不得以西流未伏明是九月之初也自春秋至今又千五百嵗麟徳厯以霜降後五日日在氐八度房心初伏定増二日以月食衝校之猶差三度閏餘稍多則建亥之始火猶}
  - {type: variant, offset: 555, length: 2, content: 經傳, WYG: 西方向使宿度不移則仲尼不得以西流未伏明非十月之候也自羲和以來火辰見伏三覩厥變然則丘明之記欲令後之作者參求微象以探仲尼之旨是嵗失閏寖久季秋中氣後天三日比及明年仲冬又得一閏悟仲尼之言補正時厯而十二月猶可以螽至哀公十四年五月庚申朔日食以開元厯考之則日食前又増一閏魯厯正矣長厯自哀公十年六月迄十四年二月纔置一閏非是又曰古厯與近代宻率相較二百年氣差一日三百年朔差一日推而上之久益先天引而下之久益後天僖公五年周厯正月辛亥朔餘四分之一南至以嵗差推之日在牽牛初至宣公十一年癸亥周厯與麟徳厯俱以庚戌日中冬至而月朔尚先麟徳厯十五辰至昭公二十年己卯周厯以正月己丑朔日中南至麟徳厯以己丑平旦冬至哀公十一年丁巳周厯入己酉蔀首麟徳厯以戊申禺中冬至惠王四十三年己丑周厯入丁卯蔀首麟徳厯以乙丑日昳冬至吕后八年辛酉周厯入乙酉蔀首麟徳厯以壬午黄昏冬至其十二月甲申人定合朔太初元年周厯以甲子夜半合朔冬至麟徳厯以辛酉禺中冬至十二月癸亥晡時合朔氣差三十二辰朔合四辰此疎宻之大較也僖公五年周厯漢厯唐厯皆以辛亥南至後五百五十餘嵗至太初元年周厯漢厯皆得甲子夜半冬至唐厯皆以辛酉則漢厯後天三日矣祖沖之張胄𤣥促上章嵗至太初元年冲之以癸亥雞鳴冬至而胄𤣥以癸亥日出欲令合于甲子而適與魯厯相㑹自此推僖公五年魯厯以庚戌冬至而二家皆以甲寅乖丘明正時之意以就劉歆之失今考麟徳元年甲子唐厯皆以甲子冬至而周厯漢厯皆以庚午然則自太初下至麟徳差四日自太初上及僖公差三日共差}
