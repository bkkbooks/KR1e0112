  - {type: variant, offset: 16875, length: 0, content: '', krp: 行夏之時使}
  - {type: variant, offset: 16877, length: 1, content: 將, WYG: 果欲用夏變周則亦何以責諸侯之無王議桓文而斥吳楚哉何休哀十四年𫝊註曰河陽冬言狩獲麟春言狩者葢據魯變周之春以為冬去周之正而行夏之時以行夏之時説春秋葢昉于此然何氏固以建子為周之春但疑春不當言狩而妄為之辭至程子門人劉質夫曰周正月非春也假天時以立義爾則遂疑建子不當言春此胡氏夏時冠周月之説所由出也先儒見孟子謂春秋天子之事而述作之旨無𫝊惟斟酌四代禮樂為百王大法遂以為作春秋本意在此故番陽吳仲迂曰若從胡𫝊則是周本行夏時而以子月為冬孔子反不行夏時而以子月為春矣何氏之失又異于此故朱子以為恐聖人制作不如是之紛更煩擾錯亂無章也薛氏又謂魯厯改冬為春而陳氏用其説于後𫝊曰以夏時冠周月魯史也是葢知春秋改周時為不順而又移其過于魯爾然謂魯自}
