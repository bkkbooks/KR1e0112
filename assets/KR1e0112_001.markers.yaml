  - {type: variant, offset: 16867, length: 0, content: '', WYG: 又記梓慎曰火出于夏為三月于商為四月于周為五月皆以周人改時改月春夏秋冬之序則循周正分至啓閉之候則仍夏時其經書冬十月雨雪春正月無氷二月無氷及冬十月隕霜殺菽之類皆為記災可知矣汲冢竹書有周月解亦曰夏數得天百王所同商以建丑為正亦越我周作正以垂三統至于敬授民時巡狩烝享猶自夏焉其言損益之意甚明經書春烝春狩夏蒐以此葢三正之義備矣而近代説者往往不然夫以左氏去聖人未逺終春秋二百四十二年以及戰國之際中國無改物之變魯未滅亡𫝊于當時正朔豈容有差而猶或有為異論者何也葢嘗考之曰殷周不改月者據商書言元祀十有二月而秦人以十月為嵗首也曰夏時冠周月者則疑建子非春而孔子嘗欲行夏之時也按太史公記三代革命于殷曰改正朔于周曰制正朔于秦曰改年始葢正謂正月朔謂月朔何氏公羊註曰夏以斗建寅之月為正}
