  - {type: variant, offset: 16882, length: 2, content: 君君, WYG: 當並存故直謂春秋以夏正數月又疑若是則古者大事必在嵗首隠公不當以寅月即位其進退無據如此固不足深辨而或者猶以為千古不决之疑則以詩書周禮論語孟子所言時月不能皆合故也夫三正通于民俗久}
