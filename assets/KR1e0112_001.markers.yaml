  - {type: variant, offset: 5, length: 0, content: '', WYG: 公軌立桓公即位十八年子莊公同立莊公即位三十二年子愍公啓方立愍公即位二年及僖公申立僖公五年正月辛亥朔旦冬至殷厯以為壬子距成公七十六嵗僖公即位三十三年子文公興立文公元年距辛亥朔旦冬至二十九嵗是嵗閏餘十三正小雪閏當在十一月後而在三月故𫝊曰非禮也後五年閏餘十是嵗亡閏而置閏閏所以正中朔也亡閏而置閏又不告朔故經曰閏月不告朔言亡此月也𫝊曰不告朔非禮也文公即位十八年子宣公倭立宣公即位十八年子成公黒肱立成公十二年正月庚寅朔旦冬至殷厯以為辛卯距定公七年七十六歲成公即位十八年子襄公午立襄公二十七年九月乙亥朔建申之月也魯史書十二月乙亥朔日有食之𫝊曰冬十一月乙亥朔日有食之於是辰在申司厯過也再失閏矣言時實行以為十一月也不察其建不考之于天也襄公即位三十一年子昭公稠立昭公二十年春王正月距辛亥百三十三嵗是辛亥後八章首也正月己丑朔旦冬至失閏故𫝊曰二月己丑日南至昭公即位三十二年及定公宋立定公七年正月己巳朔旦冬至殷厯以為庚午距元公七十六嵗定公即位十五年子哀公將立哀公十二年冬十二月流火非建戌之月也是月也螽故𫝊曰火伏而後蟄者畢今火猶西流司厯過也哀公即位二十七年遜于邾子悼公曼立悼公三十七年子元公嘉立元公四年正月戊申朔旦冬至殷厯以為己酉距康公七十六嵗元公即位二十一年子穆公衍立穆公即位三十三年子恭公奮立恭公即位二十二年子康公毛立康公四年正月丁亥朔旦冬至殷厯以為戊子距緡公七十六嵗康公即位九年子景公偃立景公即位二十九年子平公旅立平公即位二十年子緡公賈立緡公二十二年正月丙寅朔旦冬至殷厯以為丁卯距楚元七十六嵗即漢高帝之八年緡公即位二十三年子頃公讐立頃公十八年秦始滅周周凡三十六王八百六十七嵗周滅後六年楚考烈王滅魯頃公為家人秦伯五世四十九嵗漢高祖皇帝代秦繼周太嵗在午八年十一月乙巳朔旦冬至楚元三年也東漢書律厯志范氏曰黄帝造厯起辛卯顓頊用乙卯虞用戊午夏用丙寅殷用甲寅周用丁巳魯用庚子漢承秦初用乙卯至武帝元封不與天合乃作太初厯元以丁丑晉書律厯志姜岌云自皇羲以降暨于漢魏各自制厯以求厥中考其踈宻惟交㑹薄蝕可以騐之書契所記惟春秋著日蝕之變自隠公訖于哀公凡二百四十二年之間日蝕三十有六考其晦朔不知用何厯也班固以為春秋因魯厯魯厯不正故置閏失其序魯以閏餘一之嵗為蔀首檢春秋置閏不與此蔀相符也命厯序云孔子為治春秋之故退修殷之故厯使其數可𫝊于後如是春秋宜用殷厯正之今考其交㑹不與殷厯相應以殷厯考春秋月朔多不及其日又以檢經率多一日檢𫝊率少一日但公羊經𫝊異朔于理可從而經有蝕朔之騐𫝊為失之也服䖍解𫝊用太極上元太極上元乃三統厯劉歆所造元也何縁施於春秋於春秋而用漢厯無乃逺乎𫝊之違失多矣不惟斯事而已襄公二}
