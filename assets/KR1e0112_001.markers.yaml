  - {type: variant, offset: 18, length: 1, content: 冬, krp: 辰在申司厯過再失閏也考其去交分交㑹應在此月而不為再失閏也案歆厯于春秋日蝕止一朔其餘多在二日因附五行𫝊著脁與側匿之説云春秋時諸侯多失其政故月行恒遲歆不以厯失天而為之差説日之蝕朔此乃天騐也而歆反以己厯非之此寃天而負時厯也杜預又以周衰世亂學者莫得其真今之所𫝊七厯皆未必是時王之術也今誠以七家之厯考古今交㑹信無其騐也皆由斗分疏之所致也殷厯以四分一為斗分三統以一千五百三十九分之三百八十五為斗分乾象以五百八十九分之一百四十五為斗分今景初以一千八百四十三分之四百五十五為斗分疏宻不同法數各異殷厯斗分麤故不施于今乾象斗分細故不得施于古景初斗分雖在粗細之間而日之所在乃差四度日月虧已皆不及其次假使日在東井而蝕以月騐之乃在參六度差違乃爾安可以考天時人事乎今治新厯以二千四百五十一分之六百五為斗分日在斗十七度天正之首上可以考合于春秋下可以取騐于今世以之考春秋三十六蝕正朔者二十有五蝕二日者二蝕晦者二誤者五凡三十三蝕其餘蝕經元日諱之名無以考其得失圖緯皆云三百嵗斗厯改憲以今新厯施于春秋之世日蝕多在朔春秋之世下至于今凡一千餘嵗交㑹弦望故進退于三蝕之間此法乃可永載用之豈三百嵗斗厯改憲者乎姜岌後秦姚興人當晉孝武太元九年嵗在甲申春秋七百七十九日經三百九十三𫝊三百八十六三四十七日蝕三無甲乙黄帝厯得四百六十六日一蝕顓頊厯得五百九日八蝕夏厯得五百三十六日十四蝕真夏厯得四百六十六日一蝕殷厯得五百三日十三蝕周厯得五百六日十三蝕真周厯得四百八十五日一蝕魯厯得五百二十九日十三蝕三統厯得四百八十四日一蝕乾象厯得四百九十五日七蝕秦始厯得五百一十日十九蝕乾度厯得五百三十八日十九蝕今長厯得七百三十六日三十蝕漢末宋仲子集七厯以考春秋其夏周二厯術數皆與藝文志所記不同故更名為真夏真周厯也隋書律厯志中劉孝孫劉焯甲子元厯孝孫厯法並按明文以月行遲疾定其合朔欲令食必在朔不在晦二之日也縱使頻月二小三大得天之統大抵其法有三今列之云第一勘日食證恒在朔詩云}
