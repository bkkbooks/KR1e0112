body:
  text: 春秋長厯巻三右諭徳陳厚耀撰厯編一隱元年己未正小辛巳二大庚戌三小庚辰四大己酉五大己夘𫝊辛丑二十三日六小己酉七大戊寅八小戊申九大丁丑十小丁未𫝊庚申十四日十一大丙子十二小丙午杜氏云隱元年正月辛巳朔大衍厯正月辛亥朔初十日庚申冬至程氏云自三統至欽天推隱元年正月朔或辛亥或庚戌或壬子視大衍厯前後差一日以傳五月辛丑十月庚申考之則正月朔非辛亥故杜氏遷就以辛巳為朔若從辛巳則冬至不在正月矣意者差閏只在今年而杜氏考之不詳也按隱元年正月朔推古厯當得庚戌而杜氏以為辛巳蓋推後經𫝊日月而得之辛巳實上年十二月自元年至七年月朔皆先一月則知隱元之前已失一閏矣至隱七年閏後始合于厯焉宋趙子常名汸所著春秋屬辭内有日月差繆一條開載杜氏長厯及唐大衍厯日月異同與合朔日食經傳不同處頗稱詳宻今逐年録入以備叅考隱二年庚申正大乙亥二小己巳三大甲戌四小甲辰五大癸酉六小癸夘七大壬申八大壬寅經庚辰杜氏云八月無庚辰庚辰七月九日日月必有誤九小壬申十大辛丑十一小辛未十二大庚子經乙夘十六日閏小庚午杜氏云閏月庚午朔大衍厯是年閏十一月推古厯亦同按此年及隱五年隱七年杜厯俱閏十二月蓋據經𫝊日月而得之若依厯法則固無屢閏十二月者則可知春秋之閏多置之年末矣其後又不盡用此法何也隱三年辛酉正大己亥二小己巳經己巳日食三大戊戌經庚戌十三日𫝊壬戌二十五日四小戊辰經辛夘二十四日五大丁酉六小丁夘七大丙申八小丙寅經庚辰十五日九大乙未十小乙丑十一大甲午十二大甲子經癸未二十日𫝊庚戌杜云十二月無庚戌日誤經春王二月己巳日有食之杜氏云不書朔官失之榖梁云言日不言朔食晦日也朔日並不言食二日也姜岌校春秋日食云是嵗二月己亥朔無己巳三月己巳朔去交分入食限大衍與姜氏合郭守敬授時厯云是嵗三月己巳朔加時在晝去交分二十六日六千六百三十一分入食限按古厯正月得己巳朔杜氏以隱元之前已失一閏故先一月為正月則此年之二月應得己巳姜氏等所推又以己巳為三月朔則春秋之前似失兩閏矣疑之疑之大衍厯三月小己巳朔經三月庚戌在四月四月辛夘在五月八月大丙申朔經八月庚辰在九月十二月大甲午朔經十二月癸未在明年正月此以大衍厯法推春秋故多未合十二月𫝊庚戌杜氏云日誤者此月有癸未必無庚戌庚戌在癸未之前三十三日不得共一月也隱四年壬戌正小甲午二大癸亥經戊申宜在三月三小癸巳四大壬戌五小壬辰六大辛酉七小辛夘八大庚申九小庚寅十大己未十一小己丑十二大戊午經二月戊申杜氏云戊申三月十七日有日而無月按上年十二月有癸未則此年二月無戊申戊申書衛州吁事不蒙上文二月莒人伐杞故曰有日而無月孔氏云僖二十八年冬下有月而經有壬申公朝于王所亦有日而無月經如此類共有十四事隱五年癸亥正小戊子二大丁巳三小丁亥四大丙辰五大丙戌六小丙辰七大乙酉八小乙夘九大甲申十小甲寅十一大癸未十二小癸丑經辛巳二十九日閏大壬午大衍厯閏八月古厯閏七月今從杜厯隱六年甲子正小壬子二大辛巳三小辛亥四大庚辰五小庚戌經辛酉十二日𫝊庚申十一日六大己夘七大己酉八小己夘九大戊申十小戊寅十一大丁未十二小丁丑隱七年乙丑正大丙午二小丙子三大乙巳四小乙亥五大甲辰六小甲戌七大癸夘𫝊庚申十八日八小癸酉九大壬寅十小壬申十一大辛丑十二大辛未𫝊壬申初二日辛巳十一日閏小辛丑大衍厯閏下年四月古厯亦同今從杜厯按杜氏以隱元之前失一閏推勘經𫝊皆不合乃借前一月辛巳為隱元之正月朔而後合于五月之辛丑十月之庚申二年十二月之乙夘三年二月之己巳與十二月之癸未五年十二月之辛巳六年五月之辛酉庚申七年七月之庚申與十二月之壬申辛巳然與二年八月之庚辰三年十二月之庚戌四年二月之戊申又不合也不得不諉之為日月之誤杜氏以為合者多而不合者少故從其多者而皆先一月以就之其不合者又因上文脱少某月止載日辰之故則不合者又多合矣但春秋既失一閏則一二年間即當補正奈何相沿八九年誤以承誤而使數年之冬至常在二月而不在正月也恐司厯者謬不至此俟質之隱八年丙寅正大庚午二小庚子三大己巳經庚寅二十二日四小己亥𫝊甲辰初六日辛亥十三日甲寅十六日五大戊辰六小戊戌經己亥初二日辛亥十四日辛亥十四日七大丁夘經庚午初四日八小丁酉𫝊丙戌宜在七月九大丙寅經辛夘二十六日十小丙申十一大乙丑十二小乙未傳八月丙戌鄭伯以齊人朝王杜氏云上有七月庚午下有九月辛夘則八月不得有丙戌孔氏云七月二十日是丙戌九月二十一日是丙戌未知丙戌孰誤也大衍厯此年閏四月五月小己亥朔經六月己亥辛亥在此月六月大戊辰朔經七月庚午在此月八月大丁夘朔經九月辛夘在此月此自以其定閏定朔推之故不與春秋厯相符也下皆倣此隱九年丁夘正大甲子二大甲午三小甲子經癸酉初十日庚辰十七日四大癸巳五小癸亥六大壬辰七小壬戌八大辛夘九小辛酉十大庚寅閏小庚申十一大己丑𫝊甲寅二十六日十二小己未按古厯此年不應閏大衍厯亦不閏杜氏置閏于十月以合于十一月之甲寅也自此以前皆先一月今補一閏則月皆其朔而冬至在正月矣大衍厯三月小甲午朔經癸酉庚辰在四月隱十年戊辰正大戊子𫝊癸丑二十六日二小戊午三大丁亥四小丁巳五大丙戌六大丙辰經壬戌初七日辛未十六日辛巳二十六日𫝊戊申宜在五月庚午十五日庚辰二十五日七小丙戌𫝊庚寅初五日八大乙夘𫝊壬戌初八日癸亥初九日九小乙酉𫝊戊寅宜在八月十大甲寅經壬午二十九日十一小甲申十二大癸丑𫝊六月戊申公㑹齊侯鄭伯于老桃杜氏云六月無戊申戊申五月二十三日日誤孔氏云六月無戊申者下有辛巳取防亦在六月之内戊申在辛巳前三十三日不得共一月上有五月今别言六月故知日誤月不誤𫝊九月戊寅鄭伯入宋杜氏云九月無戊寅戊寅八月二十四日孔氏云經有十月壬午長厯推壬午十月二十九日戊寅在壬午前四日耳故九月不得有戊寅上有八月下有冬則誤在日也按此年為一章之終宜閏十二月大衍厯閏在下年正月杜厯不閏而置之桓元年之末以從經𫝊日月不論章法矣通春秋一書皆然然前後推移終不能越乎章蔀之大概特閏法有遷就耳大衍厯雖與春秋不合然其厯與章蔀法稍近故逐年附記之以備叅考隱十一年己巳正小癸未二大壬子三小壬午四大辛亥五小辛巳𫝊甲辰二十四日六大庚戌七小庚辰經壬午初三日𫝊庚辰即朔日八大己酉九小己夘十大戊申𫝊壬戌十五日十一大戊寅經壬辰十五日十二小戊申大衍厯閏正月七月大庚戌朔十一月大戊申朔桓元年庚午正大丁丑二小丁未三大丙子四小丙午經丁未初二日五大乙亥六小乙巳七大甲戌八小甲辰九大癸酉十小癸夘十一大壬申十二小壬寅閏大辛未杜厯是年及桓七年皆閏十二月兩閏相去六年若于中間桓四年補一閏率則三年一閏也説見桓五年大衍厯四月大丙子朔經丁未在五月桓二年辛未正大辛丑經戊申初八日二小辛未三大庚子四小庚午經戊申宜在五月五大己亥六小己巳七大戊戌八小戊辰九大丁酉十小丁夘十一大丙申十二小丙寅經夏四月取郜大鼎于宋戊申納于大廟杜氏云戊申五月初十日孔氏云長厯此年四月庚午朔其月無戊申五月己亥朔十日得戊申是有日而無月也大衍厯亦同大衍厯是年閏九月古厯亦同杜以上年既閏故是年不閏然則桓四年一閏不可不補矣桓三年壬申正大乙未二小乙丑三大甲午四小甲子五大癸巳六小癸亥七大壬辰經壬辰朔日食八小壬戌九大辛夘十大辛酉十一小辛夘十二大庚申經秋七月壬辰朔日有食之既杜氏云聖人不言月食日而以自食為文闕于所不見也姜氏以是嵗七月癸亥朔無壬辰亦失閏其八月壬辰朔去交分入食限大衍與姜氏合郭氏亦云是年八月壬辰朔加時在晝食六分十四秒按自隱三年二月己巳日食至此年七月壬辰朔日食相距一百四十一月大衍與古厯合但前後皆後一月耳則以厯法之不同也據古厯八月得壬辰朔不與經合今移四五兩頻大月于日食後則七月得壬辰朔與經合矣桓四年癸酉正小庚寅二大己未三小己丑四大戊午五小戊子六大丁巳七小丁亥八大丙辰九大丙戌十小丙辰十一大乙酉十二小乙夘閏大補甲申補閏説見下桓五年甲戌正小甲寅經甲戌己丑二大癸未三小癸丑四大壬午五小壬子六大辛巳七小辛亥八大庚辰九小庚戌十大己夘十一小己酉十二大戊寅經書春正月甲戌己丑陳侯鮑卒杜氏云甲戌前年十二月二十一日己丑此年正月六日陳亂故再赴據杜氏月日以前年十二月為甲寅朔此年正月為甲申朔矣其中必無閏月閏或在上年十二月前摠未可定但自桓元年閏十二月至桓七年始復閏十二月相去凡六年必失一閏若以此年正月為甲申朔則次年八月之壬午九月之丁夘七年二月之己亥皆不合故于上年十二月補一閏為甲申朔此年正月為甲寅朔杜厯甲寅在甲申前此甲寅在甲申後則兩大月有所移也二十一日得甲戌其己丑為再赴之誤不必辨則六年七年之月日皆合矣似爲得之大衍厯是年閏六月推古厯亦同今從杜厯置桓七年末正月小乙夘朔己夘日冬至經己丑在二月桓六年乙亥正大戊申二小戊寅三大丁未四小丁丑五大丙午六小丙子七大乙巳八小乙亥經壬午初八日九大甲辰經丁夘二十四日十小甲戌十一大癸夘十二小癸酉大衍厯八月大乙巳朔九月小乙亥朔桓七年丙子正大壬寅二小壬申經己亥二十八日亥大衍厯二月大壬寅朔經己在三月三大辛丑四小辛未五大庚子六大庚午七小庚子八大己巳九小己亥十大戊辰十一小戊戌十二大丁夘閏小丁酉大衍厯閏在明年三月今從杜厯閏此年之末桓八年丁丑正大丙寅經己夘十四日二小丙申三大乙丑四小乙未五大甲子經丁丑十四日丁大衍厯五月小乙未朔經丑在六月六小甲午七大癸亥八大癸巳九小癸亥十大壬辰十一小壬戌十二大辛夘大衍厯是年閏三月古厯閏二月杜厯不閏桓九年戊寅正小辛酉二大庚寅三小庚申四大己丑五小己未六大戊子七小戊午八大丁亥九小丁巳十大丙戌十一小丙辰十二大乙酉桓十年己夘正大乙夘經庚申初六日二小乙酉三大甲寅四小甲申五大癸丑六小癸未七大壬子八小壬午九大辛亥十小辛巳十一大庚戌十二小庚辰經丙午二十七日閏大移己酉大衍厯正月大乙酉朔乙巳日冬至經庚申在二月大衍厯是年閏十一月古厯亦同杜厯置閏于下年正月今移置此年之末庶合三年一閏之數桓十一年庚辰正小己夘二大戊申三大戊寅四小戊申五大丁丑經癸未初七日六小丁未七大丙子八小丙午九大乙亥𫝊丁亥十三日己亥二十五日十小乙巳十一大甲戌十二小甲辰桓十二年辛巳正大癸酉二小癸夘三大壬申四小壬寅五大辛未六小辛丑經壬寅初二日七大庚午經丁亥十八日八大庚子經壬辰杜氏云八月無壬辰壬辰在七月二十三日九小庚午十大己亥十一小己巳經丙戌十八日十二大戊戌經丁未初十日閏小戊辰杜厯置閏于下年正月然于經𫝊日月無據今移置此年之末大衍厯六月大辛未朔經壬寅在七月七月小辛丑朔經丁亥在八月十一月小己亥朔經丙戌在十月十二月大戊辰朔經丁未在十一月桓十三年壬午正大丁酉二小丁夘經己巳初三日三大丙申四小丙寅五大乙未六小乙丑七大甲午八小甲子九大癸巳十小癸亥十一大壬辰十二大壬戌大衍厯是年閏七月推古厯亦同今置上年末桓十四年癸未正小壬辰二大辛酉三小辛夘四大庚申五小庚寅六大己未七小己丑八大戊午經壬申十五日乙亥十八日九小戊子十大丁巳十一小丁亥十二大丙辰經丁巳初二日大衍厯八月大戊子朔經壬申乙亥在九月十二月大丙戌朔經丁巳在十一月或明年正月初二日桓十五年甲申正小丙戌二大乙夘三大乙酉經乙未十一日四小乙夘經己巳十五日五大甲申六小甲寅七大癸未八小癸丑九大壬午十小壬子十一大辛巳十二小辛亥閏大庚辰大衍厯正月丙辰朔三月大乙夘朔經乙未在四月四月小乙酉朔經己巳在五月杜厯閏明年六月恐太踈今置此年之末亦與經傳日月無碍桓十六年乙酉正小庚戌二大己夘三小己酉四大戊寅五小戊申六大丁丑七大丁未八小丁丑九大丙午十小丙子十一大乙巳十二小乙亥大衍厯是年閏四月古厯亦同今置上年末桓十七年丙戌正大甲辰經丙辰十三日二小甲戌經丙午宜在三月三大癸夘四小癸酉五大壬寅經丙午初五日六小壬申經丁丑初六日七大辛丑八小辛未經癸巳二十三日九大庚子十大庚午經朔日食書朔不書日𫝊辛夘二十二日十一小庚子十二大己巳經二月丙午公㑹邾儀父盟于趡杜氏云二月無丙午丙午三月四日也日月必有誤葢據五月有丙午六月有丁丑則丙午不在二月而在三月可知或子訛午則丙子即初三日也經冬十月朔日有食之左氏云不書日官失之也大衍厯推得十一月庚午朔日食失閏也郭氏云是年十一月不言日加時在晝交分二十六日八千五百六十分入食限按自桓三年七月壬辰朔日食至此年十月庚午日食推古厯相距一百七十六月大衍亦同杜厯少一月則知前桓四年一閏不可不補也大衍厯正月小乙亥朔壬午日冬至經丙辰在二月五月小癸酉朔經丙午在六月六月大壬寅朔經丁丑在七月八月大辛丑朔經癸巳在九月十月大庚子朔十一月庚午朔日食桓十八年丁亥正小己亥二大戊辰三小戊戌四大丁夘經丙子初十日丁酉入五月朔五小丁酉六大丙寅七小丙申𫝊戊戌初三日八大乙丑九小乙未十大甲子十一小甲午十二大癸亥經己丑二十七日經夏四月丙子公薨于齊丁酉公之喪至自齊杜氏云丁酉五月一日有日而無月不蒙上夏四月之文大衍厯四月大丁酉朔經丙子在五月丁酉在六月十二月大癸巳朔經己丑在十一月按古厯章法此年當閏十二月杜厯閏明年十月莊元年戊子正小癸巳二大壬戌三大壬辰四小壬戌五大辛夘六小辛酉七大庚寅八小庚申九大己丑十小己未經乙亥十七日閏大戊子十一小戊午十二大丁亥大衍厯閏正月今從杜厯莊二年己丑正小丁巳二大丙戌三小丙辰四大乙酉五小乙夘六大甲申七大甲寅八小甲申九大癸丑十小癸未十一大壬子十二小壬午經乙酉初四日大衍厯十二月大壬子朔經乙酉在十一月莊三年庚寅正大辛亥二小辛巳三大庚戌四小庚辰五大己酉六小己夘七大戊申八小戊寅九大丁未十大丁丑十一小丁未十二大丙子大衍厯是年閏九月古厯亦同杜厯閏明年四月莊四年辛夘正小丙午二大乙亥三小乙巳四大甲戌閏小甲辰五大癸酉六小癸夘經乙丑二十三日七大壬申八小壬寅九大辛未十小辛丑十一大庚午十二小庚子大衍厯六月大癸酉朔經乙丑在七月莊五年壬辰正大己巳二大己亥三小己巳四大戊戌五小戊辰六大丁酉七小丁夘八大丙申九小丙寅十大乙未十一小乙丑十二大甲午莊六年癸巳正小甲子二大癸巳三小癸亥四大壬辰五大壬戌六小壬辰七大辛酉八小辛夘九大庚申十小庚寅十一大己未十二小己丑大衍厯是年閏五月古厯亦同杜厯置此閏于明年四月以合于前四月之辛夘似矣然去莊四年之四月閏凡三十六月其後莊九年八月閏相去僅二十八月莊十一年三月閏相去僅十八月莊十四年五月閏相去又三十八月莊十七年六月閏相去又三十七月此十四年間凡五閏皆踈宻無定凖惟推勘經傳日月之上下而置之若按三十二月一閏之例改易分齊或遇閏之年則置之年末則與經傳日月皆不合今姑從杜厯以俟考厯者訂焉莊七年甲午正大戊午二小戊子三大丁巳四小丁亥經辛夘初五日閏大丙辰五小丙戌六大乙夘七小乙酉八大甲寅九大甲申十小甲寅十一大癸未十二小癸丑莊八年乙未正大壬午經甲午十三日二小壬子三大辛巳四小辛亥五大庚辰六小庚戌七大己夘八小己酉九大戊寅十小戊申十一大丁丑經癸未初七日十二小丁未大衍厯是年正月大壬子朔己巳日冬至經甲午在二月十一月小戊申朔經癸未在十二月自莊二年至莊八年當有三閏今止二閏必失一閏矣然補之則前後閏俱移又不可莊九年丙申正大丙子二大丙午三小丙子四大乙巳五小乙亥六大甲辰七小甲戌經丁酉二十四日八大癸夘經庚申十八日閏小癸酉九大壬寅十小壬申十一大辛丑十二小辛未大衍厯是年閏三月推古厯閏二月今杜厯閏八月莊十年丁酉正大庚子二小庚午三大己亥四大己巳五小己亥六大戊辰七小戊戌八大丁夘九小丁酉十大丙寅十一小丙申十二大乙丑莊十一年戊戌正小乙未二大甲子三小甲午閏大癸亥四小癸巳五大壬戌經戊寅十七日六小壬辰七大辛酉八大辛夘九小辛酉十大庚寅十一小庚申十二大己丑大衍厯是年閏十一月推古厯亦同今杜厯閏四月莊十二年己亥正小己未二大戊子三小戊午四大丁亥五小丁巳六大丙戌七小丙辰八大己酉經甲午初十日九小乙夘十大甲申十一大甲寅十二小甲申大衍厯是年八月小丙辰朔經甲午在九月莊十三年庚子正大癸丑二小癸未三大壬子四小壬午五大辛亥六小辛巳七大庚戌八小庚辰九大己酉十小己夘十一大戊申十二小戊寅莊十四年辛丑正大丁未二小丁丑三大丙午四大丙子五小丙午閏大乙亥六小乙巳經甲子二十日七大甲戌八小甲辰九大癸酉十小癸夘十一大壬申十二小壬寅大衍厯閏八月推古厯閏七月今從杜厯閏五月莊十五年壬寅正大辛未二小辛丑三大庚午四小庚子五大己巳六小己亥七大戊辰八大戊戌九小戊辰十大丁酉十一小丁夘十二大丙申莊之年史臣紀事多不載甲子莊十六年癸夘正小丙寅二大乙未三小乙丑四大甲午五小甲子六大癸巳七小癸亥八大壬辰九小壬戌十大辛夘十一大辛酉十二小辛夘莊十七年甲辰正大庚申二小庚寅三大己未四小己丑五大戊午六小戊子閏大丁巳七小丁亥八大丙辰九小丙戌十大乙夘十一小乙酉十二大甲寅大衍厯閏四月古厯亦同今從杜厯閏六月莊十八年乙巳正小甲申二大癸丑三大癸未經日食四小癸丑五大壬午六小壬子七大辛巳八小辛亥九大庚辰十小庚戌十一大己夘十二小己酉經書春王三月日有食之不言日不言朔杜氏曰官失之榖梁云夜食也宋劉孝孫云三月不應食五月壬子朔入食限大衍厯推五月朔交分入食限三月不應食郭氏云三月不入食限五月壬子朔加時在晝交分入食限蓋誤五為二按推厯者皆云壬子食而長厯六月始得壬子朔即云失閏亦不至相距甚逺如此郭氏云誤五為三然五三近似而春夏不得誤也經明書春三月則非夏五月可知此日食闕疑可耳沈括云春秋日食三十六厯家推騐精者不過得二十六衛朴得三十五獨莊十八年三月古今筭不入食限閻百詩云是年己巳嵗二月有閏三月癸未朔未初初刻合食限衛朴云不入食限者不知何説也按三十六食衛氏得三十五其中比月而食者二衛氏何以得之恐涉附㑹閻氏云癸未朔日食與今杜厯恰合甚竒然不知用何厯法推得之也莊十九年丙午正大戊寅二小戊申三大丁丑四小丁未五大丙子六大丙午𫝊庚申十五日七小丙子八大乙巳九小乙亥十大甲辰十一小甲戌十二大癸夘推古厯是年閏十二月大衍厯閏明年正月杜厯不閏春秋長厯卷三
