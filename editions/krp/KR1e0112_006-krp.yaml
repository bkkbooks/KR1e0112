body:
  text: 春秋長厯卷六右諭徳陳厚耀撰厯編四成元年辛未正小丙寅經辛酉二十七日二大乙未𫝊癸未十九日三小乙丑閏大甲午四小甲子五大癸巳六小癸亥七大壬辰八小壬戌九大辛夘十大辛酉十一小辛夘十二大庚申大衍厯是年閏三月古厯閏二月杜厯與大衍合按自文十三年至此成元年大衍厯置閏九杜厯置閏七校大衍實差二閏此後雖踈宻不齊然與大衍適相當不知此時司厯者何以不言失閏直復四十餘年至襄二十七年始言辰在申再失閏矣不已貿貿乎然而既差兩月不即補閏則每年冬至皆在三月成何厯法司厯者豈不知之杜氏為長厯遂因此特差二閏于四十餘年之前以實𫝊文之説恐當日之厯亦未必如此之謬也成二年壬申正小庚寅二大己未三小己丑四大戊午經丙戌二十九日一杜氏云四月無丙戌丙戌五月日今在四月五小戊子六大丁巳經癸酉十七日𫝊壬申十六日七小丁亥經己酉二十三日八大丙辰經壬午二十七日九小丙戌經庚寅初五日大杜氏云庚寅初七日有日無月衍厯九月大乙十大乙夘酉朔經庚寅在此月初六日十一小乙酉經丙申十二日十二大甲寅成三年癸酉正大甲申經辛亥二十八日二小甲寅經甲子十一日乙亥二十二日三大癸未四小癸丑五大壬午六小壬子七大辛巳八小辛亥九大庚辰十小庚戌十一大己夘經丙午二十八日丁未二十九日十二小己酉𫝊甲戌二十六日大衍厯是年閏十一月古厯亦同杜厯不閏成四年甲戌正大戊寅二小戊申三大丁丑經壬申杜氏云壬申二月二十八日則以二月朔為乙巳也似太逺四小丁未經甲寅初八日五大丙子六大丙午七小丙子閏大乙巳八小乙亥九大甲辰十小甲戌十一大癸夘十二小癸酉成五年乙亥正大壬寅二小壬申三大辛丑四小辛未五大庚子六小庚午七大己亥八大己巳九小己亥十大戊辰十一小戊戌經己酉十二日十二大丁夘經己丑二十三日成六年丙子正小丁酉二大丙寅經辛巳十六日三小丙申四大乙丑傳丁丑十三日五小乙未六大甲子經壬申初九日七小甲午八大癸亥九小癸巳十大壬戌十一小壬辰十二大辛酉大衍厯是年閏七月古厯亦同杜厯不閏成七年丁丑正大辛夘二小辛酉三大庚寅四小庚申五大己丑六小己未七大戊子八小戊午經戊辰十一日辰大衍厯八月丁亥朔經戊在九月閏大丁亥九小丁巳十大丙戌十一小丙辰十二大乙酉成八年戊寅正小乙夘二大甲申三小甲寅四大癸未五大癸丑六小癸未七大壬子八小壬午九大辛亥十小辛巳經癸夘二十三日十一大庚戌十二小庚辰成九年己夘正大己酉二小己夘三大戊申四小戊寅五大丁未六小丁丑七大丙午經丙子齊侯無野卒杜氏云丙子六月一日書七月從赴八大丙子九小丙午十大乙亥十一小乙巳經庚申十七日𫝊戊申初四日閏大甲戌十二小甲辰大衍厯閏四月古厯亦同杜厯閏十一月大衍厯十一月小甲戌朔經庚申在十月按大衍厯閏在十一月前故十一月為甲戌朔經冬十一月城中城傳曰書時也杜氏云此十一月之後十二月之前有閏月故𫝊曰書時按杜以閏月已交十二月節可以役民故謂之時然亦泥成十年庚辰正大癸酉二小癸夘三大壬申四小壬寅五大辛未傳辛巳十一日六小辛丑經丙午初六日有日無月𫝊在此月傳戊申初八日七大庚午八小庚子九大己巳十小己亥十一大戊辰十二大戊戌大衍厯六月庚子朔經丙午初七日成十一年辛巳正小戊辰二大丁酉三小丁夘經己丑二十三日四大丙申五小丙寅六大乙未七小乙丑八大甲午九小甲子十大癸巳十一小癸亥十二大壬辰成十二年壬午正小壬戌二大辛夘三小辛酉四大庚寅五大庚申𫝊癸亥初四日六小庚寅閏大補己未七小己丑八大戊午九小戊子十大丁巳十一小丁亥十二大丙辰按是年杜厯原本缺閏則去前後兩閏太踈且與下年日辰皆不合疑𫝊冩失之今補一閏于此年則皆合矣大衍厯是年閏正月古厯閏上年十二月相去一月知閏不可缺也成十三年癸未正小丙戌二大乙夘三小乙酉四大甲寅𫝊戊午初五日五小甲申𫝊丁亥初四日六大癸丑𫝊丁夘十五日己巳十七日七大癸未八小癸丑九大壬午十小壬子十一大辛巳十二小辛亥成十四年甲申正大庚辰二小庚戌三大己夘四小己酉五大戊寅六小戊申七大丁丑閏小丁未八大丙子𫝊戊戌二十三日庚子二十五日九小丙午十大乙亥經庚寅十六日庚大衍厯十月大乙巳朔經寅在閏月十一大乙巳十二小乙亥大衍厯是年閏十月古厯閏九月杜閏七月成十五年乙酉正大甲辰二小甲戌三大癸夘經乙巳初三日癸丑十一日四小癸酉五大壬寅六小壬申七大辛丑八小辛未經庚辰初十日九大庚子十小庚午十一大己亥傳辛丑初三日十二小己巳成十六年丙戌正大戊戌二小戊辰三大丁酉四小丁夘經辛未初五日𫝊戊寅十二日五大丙申六小丙寅經丙寅朔日食巳甲午晦二十九日晦𫝊癸二十八日七大乙未𫝊戊午二十四日八小乙丑九大甲午十小甲子經乙亥十二日十一大癸巳十二小癸亥經乙丑初二日乙酉二十三日大衍厯六月丙寅朔日有食之郭氏亦云以今厯推之是年六月丙寅朔加時在晝去交分二十六日九千八百三十五分入食限成十七年丁亥正大壬辰二小壬戌三大辛夘四小辛酉五大庚寅六小庚申經乙酉二十六日𫝊戊辰初九日七大己丑傳壬寅十四日八小己未九大戊子經辛丑十四日十小戊午𫝊庚午十三日十一大丁亥經壬申杜氏云十一月無壬申日誤十二小丁巳經丁巳朔日食𫝊壬午二十六日閏大丙戌傳閏月十乙夘晦三日經書十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤穀梁子曰十一月無壬申壬申在十月也𫝊壬申亦繫十一月並誤經書十有二月丁巳朔日有食之姜氏云十二月戊子朔無丁巳似失閏按十一月丁巳朔則十二月朔不得有戊子月大則丁亥朔月小則丙戌朔耳戊子二字似誤大衍推之十一月丁巳朔交分入食限郭氏亦云十一月丁巳朔加時在晝交分十四日二千八百九十七分入食限今合于十二月按厯法推之則丁巳當在明年正月今移去前兩次頻月大而後合于十二月之丁巳朔並合于閏月之乙夘晦及明年正月之甲申晦二月之乙酉朔否則合于彼不合于此合于此不合于彼矣則春秋之厯不獨閏法有差而月之大小亦無定也又按古厯法凡月之頻大者或相去十七月或相去十五月自然之數也今推杜厯有未合者則稍移頻大之前後以就之相去亦甚不逺獨此成十六年之六月丙寅朔既移去一次頻大以就之矣理應補一頻大之月以順其舊乃補之則不合于成十七年之十二月丁巳朔與明年之二月乙酉朔矣非惟不可補也又去一頻大之月而後一一相合是去兩次頻大也未知春秋當日之厯何以錯失如此而杜氏于此竟無一言及之不知如何推去也疑之疑之成十八年戊子正小丙辰經庚申初五日傳庚午十五日辛巳二十六日甲申晦二十九日二大乙酉傳乙酉朔三小乙夘四大甲申五小甲寅六大癸未七小癸丑八大壬午經己丑初八日九大壬子十小壬午十一大辛亥十二小辛巳經丁未二十七日襄元年己丑正大庾戌𫝊春己亥杜氏云下有二月則此己亥為正月正月無己亥日誤二大庚辰三小庚戌四大己夘五小己酉六大戊寅七小戊申八大丁丑九小丁未經辛酉杜氏云此月十五日則丁未朔也十大丙子十一小丙午十二大乙亥襄二年庚寅正大乙巳二小乙亥三大甲辰四小甲戌閏大癸夘五小癸酉經庚寅十八日六大壬寅經庚辰六月無庚辰庚辰在七月𫝊繋于七月大衍厯六月大壬寅朔七小壬申經己丑十八日𫝊庚辰初九日八大辛丑九小辛未十大庚子十一大庚午十二小庚子大衍厯閏三月小甲戌朔古厯閏二月襄三年辛夘正大己巳二小己亥三大戊辰四小戊戌經壬戌二十五日五大丁夘六小丁酉經己未二十三日戊寅七月十三日七大丙寅杜氏云長厯推戊寅七月十三日則七月是丙寅朔也八小丙申九大乙丑十小乙未十一大甲子十二小甲午經書六月己未同盟于雞澤戊寅叔孫豹及諸侯之大夫及陳袁僑盟戊寅雖蒙上六月而傳係叔孫豹事于秋明戊寅是七月也經闕秋七月字大衍厯亦云六月丁酉朔經戊寅在七月十三日襄四年壬辰正大癸亥二小癸巳三大壬戌經己酉杜氏云三月無己酉日誤己酉當作乙酉四小壬辰五大辛酉六小辛夘七大庚申經戊子二十九日八大庚寅經辛亥二十二日九小庚申十大己丑十一小己未十二大戊子大衍厯是年閏十二月古厯閏十一月杜閏下年當移置此襄五年癸巳正小戊午二大丁亥三小丁巳四大丙戌傳甲寅二十九日見襄六年傳閏小丙辰五大乙酉六小乙夘七大甲申八小甲寅九大癸未𫝊丙午二十四日十小癸丑十一大壬午傳甲午十三日十二小壬子經辛未二十日襄六年甲午正小壬午二大辛亥三小辛巳經壬午初二日傳乙未十五日丁未二十六日四大庚戌五小庚辰六大己酉七小己夘八大戊申九小戊寅十大丁未十一小丁丑𫝊丙辰在十二月十二大丙午襄七年乙未正小丙子二大乙巳三小乙亥四大甲辰五大甲戌六小甲辰七大癸酉八小癸夘九大壬申大衍厯九月小壬寅朔經壬戌在此月十小壬寅經壬戌二十一日𫝊庚戌初九日閏大辛未十一小辛丑十二大庚午經丙戌十七日大衍厯閏八月大壬申朔古厯閏七月襄八年丙申正小庚子二大己巳三小己亥四大戊辰傳庚辰十三日庚寅二十三日五小戊戌𫝊甲辰初七日六大丁夘七大丁酉八小丁夘九大丙申十小丙寅十一大乙未十二小乙丑襄九年丁酉正大甲午二小甲子三大癸巳四小癸亥五大壬辰經辛酉三十日六小壬戌七大辛夘八小辛酉經癸未二十三日九大庚寅十小庚申𫝊庚午十一日甲戌十五日十一大己丑傳己亥十一日二大衍厯十一月大己丑朔經十月己亥在此月十二大己未經己亥𫝊繋十一月𫝊癸亥初五日戊寅二十日𫝊十二月癸亥門其三門閏月戊寅濟于隂阪杜氏云以長厯推校上下此年不得有閏月戊寅戊寅是十二月二十日疑閏月當為門五日五字上與門合為閏則後人自然轉日為月顧允中曰閏月應作門五日襄十年戊戌正小己丑二大戊午三小戊子𫝊癸丑二十六日四大丁巳傳戊午初二日丙寅初十日五小丁亥經甲午初八日𫝊庚寅初四日六大丙辰傳庚午十五日七小丙戌八大乙夘傳丙寅十二日九小乙酉傳己酉二十五日十大甲寅傳戊辰十五日十一小甲申傳己亥十六日丁未二十四日閏大癸丑十二小癸未大衍厯四月小丁亥朔是年閏四月經甲午在閏月古厯亦閏四月蘇氏云按杜厯襄十年十一月丁未是二十四日十一年四月己亥是十九日據丁未至己亥一百七十三日前後除兩殘月惟置四个整月用日不盡尚餘二十九日故杜厯于十年十一月後置閏既十年有閏明九年無閏也按襄九年十年十一年經傳上下日月皆合杜厯之説則置閏宜在襄十年之末但不必定為十一月耳襄十一年己亥正大壬子二大壬午三小壬子四大辛巳𫝊己亥十九日五小辛亥六大庚辰七小庚戌經己未初十日𫝊丙子二十七日八大己夘九小己酉傳甲戌二十六日十大戊寅𫝊丁亥初十日十一小戊申十二大丁丑傳戊寅初二日庚辰初四日壬午初六日己丑十三日傳冬十二月戊寅㑹于蕭魚杜氏云經書秋後冬前史失之按經傳時月互異者不一或史即赴告時書之或傳所據各國史書彼此訛舛不與經合若諸侯之㑹無國不紀故傳于此年之事自四月己亥以後所書月日甚詳經書秋七月己未同盟于亳城北後有公至自伐鄭楚子鄭伯伐宋二事則諸侯之再伐鄭也必在九月經例不書月𫝊固與經不異鄭受伐乃使良霄如楚諸侯觀兵鄭東門鄭人行成又晉鄭交涖盟已不得復在九月况涖盟後始退師為蕭魚之㑹豈復一月中事乎蓋下文冬字當在㑹于蕭魚之上不知何由致誤也襄十二年庚子正小丁未二大丙子三小丙午四大乙亥五小乙巳六大甲戌七大甲辰八小甲戌九大癸夘十小癸酉十一大壬寅十二小壬申推古厯是年閏十二月杜厯閏明年八月襄十三年辛丑正大辛丑二小辛未三大庚子四小庚午五大己亥六小己巳七大戊戌八小戊辰閏大丁酉九小丁夘經庚辰十四日十大丙申十一大丙寅十二小丙申大衍厯是年閏正月襄十四年壬寅正大乙丑二小乙未經乙未朔日食三大甲子四小甲午經己未二十六日五大癸亥六小癸巳七大壬戌八小壬辰九大辛酉十小辛夘十一大庚申十二小庚寅經二月乙未朔日有食之郭氏云以今厯推之是月乙未朔加時在晝交分十四日一千三百九十三分入食限襄十五年癸夘正大己未二大己丑經己亥十一日三小己未四大戊子五小戊午六大丁亥七小丁巳八大丙戌經丁己日食不書朔九小丙辰十大乙酉十一小乙夘經癸亥初九日十二大甲申經秋八月丁巳日有食之不書朔杜氏云八月無丁巳丁巳七月一日也日月必有誤姜氏云七月丁巳朔食失一閏也大衍厯同郭氏亦云今厯推之七月丁巳朔加時在晝去交分二十六日三千三百九十四分入食限今推得丁巳朔在七月大衍厯是年閏十月乙夘朔經癸亥在閏月古厯閏九月杜厯不閏閏在明年襄十六年甲辰正小甲寅二大癸未大衍厯二月小癸丑朔經戊寅在此月三小癸丑經戊寅二十六日四大壬午大衍厯四月大壬子朔經甲子在此月五大壬子經甲子十三日六小壬午𫝊庚寅初九日七大辛亥八小辛巳九大庚戌十小庚辰閏大己酉十一小己夘十二大戊申襄十七年乙巳正小戊寅二大丁未經庚午二十四日三小丁丑四大丙午五小丙子六大乙巳七小乙亥八大甲辰九大甲戌十小甲辰十一大癸酉𫝊甲午二十二日十二小癸夘襄十八年丙午正大壬申二小壬寅三大辛未四小辛丑五大庚午六小庚子七大己巳八小己亥九大戊辰十小戊戌𫝊丙寅晦二十九日十一大丁夘𫝊丁夘朔十己夘十三日乙酉九日十二小丁酉𫝊戊戌初二日己亥初三日甲辰初八日大衍厯是年閏六月古厯亦同杜厯閏在明年襄十九年丁未正大丙寅二大丙申𫝊甲寅十九日三小丙寅四大乙未𫝊丁未十三日五小乙丑𫝊壬辰晦六大甲午七小甲子經辛夘二十八日八大癸巳經丙辰二十四日𫝊甲辰十二日九小癸亥閏大壬辰十小壬戌十一大辛夘十二小辛酉𫝊夏五月壬辰晦齊靈公卒而經書秋七月辛夘杜氏云從赴也今依厯推之則五月晦乃癸巳而非壬辰六月甲午朔而非癸巳癸巳朔在八月相去兩月若曲變其法以從壬辰晦則與襄二十年之十月丙辰朔又不合矣竊疑春秋時有用周正者亦有用夏正者其各國所書日月不盡合于魯故經傳多不合月每差兩月日每差一日朔法之差齊之夏五月即魯之秋七月辛夘與壬辰亦相差一日也俟徐考之大衍厯七月大癸巳朔經辛夘在六月八月小癸亥朔經丙辰在七月襄二十年戊申正大庚寅經辛亥二十二日二小庚申三大己丑四小己未五大戊子六大戊午經庚申初三日七小戊子八大丁巳九小丁亥十大丙辰經丙辰朔日食十一小丙戌十二大乙夘經冬十月丙辰朔日有食之大衍厯丙辰朔日食郭氏云今厯推之是年十月丙辰朔加時在晝交分十三日七千六百分入食限襄二十一年己酉正小乙酉二大甲寅大衍厯二月小甲申朔閏二月癸亥朔三小甲申四大癸丑五小癸未六大壬子七小壬午八大辛亥閏小辛巳九大庚戌經庚戌朔日食十小庚辰經庚辰朔日食十一大己酉十二大己夘大衍厯是年閏二月古厯亦同杜厯閏八月經秋九月庚戌朔日有食之大衍厯同郭氏云今厯推之是月庚戌朔加時在晝交分十四日三千六百八十二分入食限經冬十月庚辰朔日有食之姜氏云比月而食宜在誤條大衍厯云庚辰朔日在黄道角四度非食限郭氏云今厯推之十月已過食限不應頻食姜説為是按比月而食自古推厯者無此術即精厯如姜郭亦云無比月而食之理然春秋已兩見如此年及二十四年是也或以為春秋世亂日度失行之騐然漢書所載高帝三年冬十月甲戌晦日食十一月癸夘晦又日食文帝三年冬十月丁酉晦日食十一月丁夘晦又日食皆比月而食者豈盡日度失行之故耶是不可曉襄二十二年庾戌正小己酉二大戊寅三小戊申四大丁丑五小丁未六大丙子七小丙午經辛酉十六日八大乙亥九小乙巳𫝊己巳二十五日十大甲戌十一小甲辰十二大癸酉傳丁巳杜氏云十二月無丁巳丁巳十一月十四日也襄二十三年辛亥正大癸夘二小癸酉經癸酉朔日食三大壬寅經己巳二十八日四小壬申五大辛丑六小辛未七大庚子八小庚午經己夘初十日九大己亥十小己巳經乙亥初七日十一大戊戌十二小戊辰經二月癸酉朔日有食之大衍厯同郭氏云今厯推之是月癸酉朔加時在晝交分二十六日五千七百三分入食限大衍厯是年閏十二月古厯閏十一月杜閏在明年襄二十四年壬子正大丁酉二小丁夘三大丙申閏小丙寅此閏可置上年末四大乙未五小乙丑六大甲午七小甲子經甲子朔日食八大癸巳經癸巳朔日食九大癸亥十小癸巳十一大壬戌十二小壬辰經秋七月甲子朔日有食之既大衍厯同郭氏云是月甲子朔加時在晝日食九分六秒經八月癸巳朔日有食之姜氏云比月而食在誤條大衍云癸巳朔日在黄道星二度過食限不應食郭氏云漢志董仲舒以為比食又既今厯推之立分不叶不應食大衍説是劉氏炫云日月共盡一體日食少則月食多日食多則月食少日食盡則前後望月不食月食盡則前後朔日不食以其交道盡不復相揜故也此與二十一年頻月日食理必不然疑古書厯世遥逺轉冩失真耳趙子常汸曰按日月交㑹有常而積久不無小變動日或失其常度則雖巧厯有不能盡者漢高祖三年十月十一月晦日頻食文帝三年十月十一月晦並頻食是漢初三十年間頻食者再後世未有此固未可以常理推也春秋長厯卷六
