body:
  text: 春秋長厯春秋類提要臣等謹案春秋長厯十卷國朝陳厚耀撰厚耀字泗源泰州人康熙丙戌進士官蘇州府教授以通算入直内廷改授檢討終右諭徳是書補杜預長厯而作不分卷帙其凡有四一曰厯證備引漢書續漢書晉書隋書唐書宋史元史及左𫝊註疏春秋屬詞天元厯理及朱載堉厯法新書諸説以證推歩之異其引春秋屬詞載杜預論日月差繆一條為註疏所無又引大衍厯議春秋厯考一條亦唐志所未錄尤足以資考證二曰古厯以古法十九年為一章一章之首推合周厯正月朔日冬至前列算法後以春秋十二公紀年横列為四章縱列十二公積而成表以求厯元三曰厯編舉春秋二百四十二年一一推其朔閏及月之大小而以經𫝊干支為之證佐皆述杜預之説而考辨之四曰歴存以古厯推隠公元年正月庚戌朔杜氏長厯則為辛巳朔乃古厯所推之上年十二月朔元年之前失一閏葢以經𫝊干支排次知之厚耀則謂如預之説元年至七年中書日者雖多不失而與二年八月之庚辰三年十二月之戊申又不能合且隠公三年二月己巳朔日食桓公三年七月壬辰朔日食亦皆失之葢隠公元年以前非失一閏乃多一閏因退一月就之定隠公元年正月為庚辰朔較長厯實退兩月推至僖公五年止以下朔閏因一一與杜厯符合故不復續載焉杜預書惟以干支遞排而以閏月小建為之遷就厚耀明於厯法故所推較預為宻葢非惟補其闕佚並能正其譌舛於考證之學極為有裨治春秋者固不可少此一編矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c23d96d083003d896b9d7ba6f3f7d24be1fc9341750ec8c75ac6637cf08b0805
