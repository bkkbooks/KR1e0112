body:
  text: 春秋長厯巻五右諭徳陳厚耀撰厯編三僖二十三年甲申正小戊辰二大丁酉三小丁夘四大丙申五小丙寅經庚寅二十五日六大乙未七小乙丑八大甲午九小甲子十大癸巳十一小癸亥十二大壬辰晉語註云僖二十三年魯失閏以閏月為明年正月按是年為一章之終推厯當閏十二月而魯厯不閏前隱十年亦為一章之終而魯厯亦不閏則知春秋之厯其不按章法也久矣漢書以僖五年為朔旦冬至之年恐亦未可為據也僖二十四年乙酉正小壬戌二大辛夘𫝊甲午初四日辛丑十一日壬寅十二日日丙午十六日丁未十七日戊申十八三小辛酉𫝊己丑晦二十九日四大庚寅閏小庚申五大己丑六小己未七大戊子八小戊午九大丁亥十大丁巳十一小丁亥十二大丙辰晉語註云僖二十四年三月己丑朔時以為二月晦又云是年失閏以三月為四月按晉註所云蓋遵古厯然己丑乃五月朔亦非三月也豈月之大小有所移耶又按大衍厯是年閏正月杜于四月置閏以補上年之閏其閏于四月者因合于二月三月之日干支也然下年又閏則比年皆閏矣似與厯法不合若移置上年則又與日不合今姑從之僖二十五年丙戌正小丙戌經丙午二十一日二大乙夘三小乙酉𫝊甲辰二十日四大甲寅經癸酉二十日𫝊丁巳初四日戊午初五日五小甲申六大癸丑七小癸未八大壬子九小壬午十大辛亥十一小辛巳十二大庚戌經癸亥十四日閏大庚辰按自此年一閏至宣二年凡二十九年杜厯置閏者十皆踈宻不等僖三十年閏九月去此年閏五十七月文元年閏三月去前閏四十二月文二年閏正月去前閏僅十月文四年閏三月去前閏二十六月文六年閏十二月去前閏三十二月文八年閏七月去前閏十九月文十二年閏十一月去前閏五十二月文十六年閏五月去前閏四十二月宣二年閏五月去前閏四十八月若悉移置之以合于章法則與經傳日月皆不合故今悉仍其舊以俟知厯者酌焉又按自僖二十五至宣二凡二十九年中大衍厯置閏者十一而杜厯止十閏則缺一閏可知也推古厯亦應十一閏僖二十六年丁亥正小庚戌經己未初十日己大衍厯正月小辛巳朔經未在二月二大己夘三小己酉四大戊寅五小戊申六大丁丑七小丁未八大丙子九小丙午十大乙亥十一小乙巳十二大甲戌大衍厯正月壬寅日二十二日冬至是年閏九月古厯同僖二十七年戊子正小甲辰二大癸酉三小癸夘四大壬申五大壬寅六小壬申經庚寅十九日七大辛丑八小辛未經乙未二十五日乙巳杜氏云八月無乙巳乙巳九月六日九大庚子十小庚午十一大己亥十二小己巳經甲戌初六日大衍厯八月大辛未朔經乙巳在九月五日僖二十八年己丑正大戊戌𫝊戊申十一日二小戊辰三大丁酉經丙午初十日四小丁夘經己巳初三日𫝊戊辰初二日癸巳初七日甲午二十八日五大丙申經癸丑十八日傳丙午十一日丁八日未十二日己酉十四日癸亥二十六小丙寅𫝊壬午十七日七大乙未𫝊丙午初二日八大乙丑九小乙未十大甲子經壬申初十日傳丁丑十五日皆壬申二月丁丑俱繫冬後有日而無月或在十十一小甲午十二大癸亥是年宜補一閏僖二十九年庚寅正小癸巳二大壬戌三小壬辰四大辛酉五小辛夘六大庚申七小庚寅八大己未九小己丑十大戊午十一小戊子十二大丁巳大衍厯是年閏六月古厯亦同杜厯無閏僖三十年辛夘正大丁亥二小丁巳三大丙戌四小丙辰五大乙酉六小乙夘七大甲申八小甲寅九大癸未𫝊甲午十二日閏小癸丑十大壬午十一小壬子十二大辛巳僖三十一年壬辰正小辛亥二大庚辰三小庚戌四大己夘五大己酉六小己夘七大戊申八小戊寅九大丁未十小丁丑十一大丙午十二小丙子上年閏宜置此年之末僖三十二年癸巳正大乙巳二小乙亥三大甲辰四小甲戌經己丑初四日丑大衍厯甲辰朔經己在三月五大癸夘六小癸酉七大壬寅八大壬申九小壬寅十大辛未十一小辛丑十二大庚午經己夘初十日𫝊庚辰十一日大衍厯是年閏二月古厯亦同杜厯不閏大衍厯閏二月小乙巳朔故三月甲辰朔十二月大庚子朔經己夘在十一月僖三十三年甲午正小庚子二大己巳三小己亥四大戊辰經辛巳十四日癸巳二十六日大衍厯四月戊戌朔經辛巳癸巳在三月五小戊戌六大丁夘七小丁酉八大丙寅𫝊戊子二十三日九小丙申十大乙丑十一小乙未十二大甲子經乙巳杜氏云乙巳十一月十二日經書十二月誤劉氏云按如杜厯四月丁夘朔八月乙丑朔則辛巳四月十五日癸巳二十七日而乙巳為十一月十二日大衍厯則辛巳癸巳皆在三月而乙巳為十二月十一日杜厯自隱元年至文元年三十四閏大衍三十六閏蓋春秋周厯本差而後世追筭又互有得失杜氏惟據長厯釋經遂以此年十二月所書四事皆為十一月亦固矣文元年乙未正小甲午二大癸亥經癸亥日食三小癸巳閏大壬戌𫝊閏三月四小壬辰經丁巳二十六日五大辛酉𫝊辛酉朔六大辛夘𫝊戊戌初八日七小辛酉八大庚寅九小庚申十大己丑十一小己未十二大戊子經二月癸亥日有食之杜氏云不書朔官失之也姜氏云二月甲午朔無癸亥三月癸亥朔入食限大衍厯亦以為然郭氏亦云三月癸亥朔加時在晝去交分二十六日五千九百一十分入食限諸家各以其厯推春秋故癸亥在三月傳曰於是閏三月非禮也杜註云閏當在僖公末年誤于今年置閏孔氏云僖五年正月辛亥朔日南至治厯者皆以彼為章首之嵗漢書律厯志云文公元年距僖公五年辛亥二十九嵗是時閏餘十三閏當在十一月後而在三月故𫝊曰非禮志之所言是嫌閏月大近前也杜以僖三十年閏九月文二年閏正月故言厯法當在僖公末年誤于今年置閏是嫌置閏大近後也又云杜以春秋之世厯法錯失所置閏月或先或後惟推勘經傳上下日月以為長厯若日月同者則數年不置閏若日月不同須置閏乃同者則未滿三十二月頻置閏所以異于常厯故釋例云春秋日有頻月而食者有曠年不食者理不得一一如筭以守恒數故厯無有不失今據經傳微旨考日辰晦朔以相發明為春秋長厯雖未必得天蓋春秋當時之厯也按推勘日月則僖末年不得有閏而杜以為當閏者豈以文元為章首而上年之末當有閏耶然文二年二月之閏又何以太數也大衍厯是年閏十二月古厯閏十月今從傳閏三月文二年丙申正小戊午閏大丁亥二大丁巳經甲子初八日丁丑二十一日三小丁亥經乙巳十九日四大丙辰傳乙巳杜氏云經書三月乙巳𫝊書夏四月乙巳經傳必有一誤五小丙戌六大乙夘七小乙酉八大甲寅經丁夘十四日九小甲申十大癸丑十一小癸未十二大壬子按文元年閏三月矣于二年復閏正月相去僅十月似太促又文四年三月閏相去二十六月文六年十二月閏見經相去三十三月文八年七月閏相去十九月文十二年十一月閏相去五十二月文十六年五月閏相去四十二月宣二年五月閏相去四十八月此二十年間凡八閏或太踈或太促欲移置之則與經傳日月多不合今姑從之大衍厯亦八閏大衍厯是年正月大戊子朔己丑日冬至二月小戊午朔經甲子丁丑在此月文三年丁酉正小壬午二大辛亥三小辛巳四大庚戌𫝊乙亥二十六日五小庚辰六大己酉七大己夘八小己酉九大戊寅十小戊申十一大丁丑十二小丁未經己巳二十三日文四年戊戌正大丙子二小丙午三大乙亥閏小乙巳四大甲戌五小甲辰六大癸酉七小癸夘八大壬申九小壬寅十大辛未十一大辛丑經壬寅初三日十二小辛未大衍厯閏八月古厯閏七月文五年己亥正大庚子二小庚午三大己亥經辛亥十三日四小己巳五大戊戌六小戊辰七大丁酉八小丁夘九大丙申十小丙寅經甲申十九日十一大乙未十二小乙丑文六年庚子正大甲午二大甲子三小甲午四大癸亥五小癸巳六大壬戌七小壬辰八大辛酉經乙亥十五日九小辛夘十大庚申十一小庚寅𫝊丙寅杜氏云十月無丙寅十一月八日也十二大己未閏小己丑經閏月經書閏月不告月在冬十月後下文無月故知閏十二月也程氏云按厯法是年未應閏經書閏月則周閏有所移也文七年辛丑正大戊午二小戊子三大丁巳經甲戌十八日甲大衍厯三月大戊子朔經戌在二月四小丁亥經戊子初二日𫝊己丑初三日五大丙辰六大丙戌七小丙辰八大乙酉九小乙夘十大甲申十一小甲寅十二大癸未大衍厯是年閏四月古厯亦同文八年壬寅正小癸丑二大壬午三小壬子四大辛巳五小辛亥六大庚辰七小庚戌八大己夘經戊申三十日九大己酉十小己夘經壬午初四日乙酉初七日丙戌初八日十一大戊申十二小戊寅杜厯是年閏七月以推下八月之戊申十月之壬午乙酉丙戌及明年正月之己酉乙丑二月之辛丑三月之甲戌九月之癸酉皆不合若移置明年七月閏則上下皆合矣疑當日傳冩之訛今改之文九年癸夘正大丁未傳己酉初三日乙丑十九日二小丁丑經辛丑二十五日三大丙午傳甲戌二十九日四小丙子五大乙巳六小乙亥七大甲辰閏小移甲戌八大癸夘九小癸酉經癸酉初一日十大壬寅十一小壬申十二大辛丑杜厯閏在上年七月今置此年七月則上下日辰干支皆合説見上年推古厯是年閏十二月大衍厯閏明年正月相去一月知是年當閏也大衍厯九月小甲辰朔經癸酉在十月朔文十年甲辰正大辛未二小辛丑三大庚午經辛夘二十二日四小庚子五大己巳六小己亥七大戊辰八小戊戌九大丁夘十小丁酉十一大丙寅十二小丙申文十一年乙巳正大乙丑二小乙未三大甲子𫝊甲子朔見襄公三十年絳縣老人言四小甲午五大癸亥六大癸巳七小癸亥八大壬辰九小壬戌十大辛夘經甲午初四日十一小辛酉十二大庚寅文十二年丙午正小庚申二大己丑經庚子十二日三小己未四大戊子五小戊午六大丁亥七小丁巳八大丙戌九大丙辰十小丙戌十一大乙夘閏小乙酉十二大甲寅經戊午初五日大衍厯是年閏十月古厯閏九月按自此年至成十四年共三十九年大衍厯置閏十五推古厯亦同而杜厯止閏十三實少兩閏其間干支訛誤甚多經傳各異疑所據厯各有不同莫得其次序也文十三年丁未正小甲申二大癸丑三小癸未四大壬子五小壬午經壬午初一日六大辛亥七小辛巳八大庚戌九小庚辰十大己酉十一小己夘十二大戊申經己丑杜氏云十二月無己丑己丑十一月十一日大衍厯十一月庚辰朔經己丑在此月文十四年戌申正大戊寅二小戊申三大丁丑四小丁未五大丙子經乙亥五月乙亥齊侯潘卒杜氏従赴云乙亥在四月二十九日書五月六小丙午七大乙亥傳乙夘杜氏云七月無乙夘日誤八小乙巳九大甲戌經甲申十一日十小甲辰十一大癸酉十二小癸夘文十五年己酉正大壬申二小壬寅三大辛未四小辛丑五大庚午六大庚子經辛丑朔日食八戊申初九日杜云日七小庚午八大己亥九小己巳十大戊戌十一小戊辰十二大丁酉經書六月辛丑朔日有食之大衍厯同郭氏亦云六月辛丑朔加時在晝交分二十六日四千四百七十三分入食限按辛丑朔在四月六月庚子朔或云食在二日然與經朔字不合杜厯並未言誤不知何故大衍厯是年閏六月古厯亦同杜厯閏在下年五月文十六年庚戌正小丁夘二大丙申三小丙寅四大乙未五小乙丑閏大甲午六小甲子經戊辰初六日七大癸巳八小癸亥經辛未初九日九大壬辰十大壬戌十一小壬辰𫝊甲寅二十三日十二大辛酉文十七年辛亥正小辛夘二大庚申三小庚寅四大己未經癸亥初五日五小己丑六大戊午經癸未二十六日七小戊子八大丁巳九小丁亥十大丙辰十一小丙戌十二大乙夘文十八年壬子正小乙酉二大甲寅經丁丑二十四日三大甲申四小甲寅五大癸未經戊戌十六日戌大衍厯五月癸丑朔經戊在四月六小癸丑經癸酉二十一日酉大衍厯六月癸未朔經癸在五月七大壬午八小壬子九大辛巳十小辛亥十一大庚辰十二小庚戌大衍厯是年閏二月古厯亦同杜厯不閏宣元年癸丑正大己夘二小己酉三大戊寅四大戊申五小戊寅六大丁未七小丁丑八大丙午九小丙子十大乙巳十一小乙亥十二大甲辰宣二年甲寅正小甲戌二大癸夘經壬子初十日三小癸酉四大壬寅五小壬申閏大辛丑六小辛未七大庚子八大庚午九小庚子經乙丑二十七日十大己巳經乙亥初七日𫝊壬申初四日十一小己亥十二大戊辰大衍厯是年正月小甲辰朔癸亥日冬至經二月壬子在正月又閏十一月小己巳朔古厯閏十一月今杜厯閏五月宣三年乙夘正小戊戌二大丁夘三小丁酉四大丙寅五小丙申六大乙丑七小乙未八大甲子九小甲午十大癸亥經丙戌二十四日十一大癸巳十二小癸亥大衍厯九月小甲子朔經丙戌在此月宣四年丙戊正大壬辰二小壬戌三大辛夘四小辛酉五大庚寅六小庚申經乙酉二十六日七大己丑𫝊戊戌初十日八小己未九大戊子十小戊午十一大丁亥十二小丁巳大衍厯五月大庚申朔經乙酉在此月宣五年丁巳正大丙戌二小丙辰三大乙酉四大乙夘五小乙酉六大甲寅七小甲申八大癸丑九小癸未十大壬子十一小壬午十二大辛亥閏小辛巳杜厯閏在明年六月去宣二年五月之閏似太踈故置此年之末以均前後之閏其間亦無日月乖礙也又按杜厯宣二年置一閏直至宣六年始再置一閏宣十年又置一閏相距甚踈若移宣六年之閏于四年五年之間而于宣七年補一閏于年末庶前後相均也然與宣八年之日月不合今從杜厯大衍厯是年閏八月古厯閏七月知是年當閏也宣六年戊午正大庚戌二小庚辰三大己酉四小己夘五大戊申六小戊寅七大丁未八大丁丑九小丁未十大丙子十一小丙午十二大乙亥宣七年己未正小乙巳二大甲戌三小甲辰四大癸酉五小癸夘六大壬申七小壬寅八大辛未九小辛丑十大庚午十一大庚子十二小庚午宣八年庚申正大己亥二小己巳三大戊戌四小戊辰五大丁酉六小丁夘經辛巳十五日壬午十六日戊子二十二日七大丙申甲子日食在十月八小丙寅九大乙未十小乙丑經己丑二十四日十一大甲午十二小甲子經書秋七月甲子日有食之既不書朔杜氏云甲子七月三十日杜以七月為乙未朔姜氏云十月甲子朔日食大衍同郭氏亦云是年十月甲子朔加時在晝食九分八十一秒蓋十誤為七按經甲子日食在七月而推厯者皆以為十月以七月甲子不入食限也然十月乃乙丑朔非甲子朔郭氏云十誤為七非也十可誤為七冬亦可誤為秋乎愚意是秋九月甲子食而甲子即九月晦日十月朔得乙丑與此厯合蓋推厯者用定朔故以甲子為十月朔耳程氏云杜長厯自僖十二年至文元年五年一閏者二四年一閏者三失二閏焉又自文十六年至宣十年四年一閏者三又失一閏焉按周厯果失閏則日食宜逾大衍日食之後而今反在大衍日食之前則知周厯未嘗失閏而杜厯之自失閏耳大衍厯是年閏五月丁酉朔十月甲子朔古厯閏四月杜厯不閏宣九年辛酉正大癸巳二小癸亥三大壬辰四大壬戌五小壬辰六大辛酉七小辛夘八大庚申九小庚寅經辛酉杜氏云九月無辛酉日誤辛酉在八月十大己未經癸酉十五日十一小己丑十二大戊午大衍厯八月小庚申朔經辛酉在此月宣十年壬戌正小戊子二大丁巳三小丁亥四大丙辰經丙辰日食不書朔五小丙戌經癸巳初八日閏大乙夘六大乙酉七小乙夘八大甲申九小甲寅十大癸未十一小癸丑十二大壬午經夏四月丙辰日有食之杜氏云不書朔官失之也大衍厯丙辰朔日食郭氏亦云以今厯推之是月丙辰朔加時在晝交分十四日九百六十八分入食限推古厯閏十二月大衍厯閏明年正月宣十一年癸亥正小壬子二大辛巳三小辛亥四大庚辰五小庚戌六大己夘七小己酉八大戊寅九小戊申十大丁丑經辛亥十月無辛亥辛亥或在十一月有日而無月十一大丁未十二小丁丑大衍厯是年閏正月宣十二年甲子正大丙午二小丙子三大乙巳四小乙亥五大甲辰閏小甲戌六大癸夘經乙夘十三日𫝊丙辰十四日辛未二十九日七小癸酉大衍厯七月癸夘朔經乙夘在此月八大壬寅九小壬申十大辛丑十一小辛未十二大庚子經戊寅杜氏云十二月無戊寅戊寅也十一月九日蓋以十一月為庚午朔宣十三年乙丑正小庚午二大己亥三大己巳四小己亥五大戊辰六小戊戌七大丁夘八小丁酉九大丙寅十小丙申十一大乙丑十二小乙未大衍厯是年閏九月古厯亦同杜厯不閏宣十四年丙寅正大甲子二小甲午三大癸亥四小癸巳五大壬戌經壬申十一日六大壬辰七小壬戌八大辛夘九小辛酉十大庚寅十一小庚申十二大己丑宣十五年丁夘正小己未二大戊子三小戊午四大丁亥五小丁巳六大丙戌經癸夘十八日𫝊辛亥二十六日七小丙辰𫝊壬午二十七日杜氏云二十九日則以七月為甲寅朔也似誤八大乙酉九小乙夘十大甲申十一大甲寅閏小甲申十二大癸丑宣十六年戊辰正小癸未二大壬子三小壬午𫝊戊申二十七日四大辛亥五小辛巳六大庚戌七小庚辰八大己酉九小己夘十大戊申十一小戊寅十二大丁未大衍厯是年閏六月古厯亦同杜厯閏在上年宣十七年己巳正大丁丑經庚子二十四日丁未杜氏云丁未二月四日則以二月為甲辰朔誤二小丁未三大丙子四小丙午五大乙亥六小乙巳經癸夘日食不書朔己未十五日七大甲戌八小甲辰九大癸酉十小癸夘十一大壬申經壬午十一日十二小壬寅經六月癸夘日有食之杜氏云不書朔官失之姜氏云六月甲辰朔不應食大衍厯云五月在交限六月甲辰朔交分已過食限蓋誤郭氏云今厯推之是年五月乙亥入食限六月甲辰朔泛交二日已過食限大衍為是按姜郭所云日食不在癸夘而在甲辰癸夘亦非六月朔而經又不書朔則此日食闕疑可也杜以為癸夘朔朔字官失之似未深考又按春秋日食雖月之前後有小差而日未嘗誤惟此年日食經以為癸夘而後之推厯者皆以為乙亥相隔二十八日疑是他年日食誤書于此大衍厯是年正月小丁丑朔經丁未在二月二日五月乙亥朔日食六月大甲辰朔宣十八年庚午正大辛未二小辛丑三大庚午四小庚子五大己巳六大己亥七小己巳經甲戌初六日八大戊戌九小戊辰十大丁酉經壬戌二十六日十一小丁夘十二大丙申春秋長厯巻五
