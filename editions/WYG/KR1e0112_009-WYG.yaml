body:
  text: 春秋長厯卷九右諭徳陳厚耀撰長厯退兩月譜自隱元年至桓十八年止隱元年己未正小庚辰二大己酉三大己卯四小己酉五大戊寅𫝊辛丑二十四日六小戊申七大丁丑八小丁未九大丙子十小丙午𫝊庚申十五日十一大乙亥十二小乙巳杜氏云隱元年正月辛巳朔大衍厯正月辛亥朔初十日庚申冬至程氏云自三統至欽天推隠元年正月朔或辛亥或庚戌或壬子視大衍厯前後差一日以𫝊五月辛丑十月庚申考之則正月朔非辛亥故始遷就以辛巳為朔若從辛巳則冬至不在正月意者差閏只在今年而杜氏考之不詳耳按隠元年正月朔推古厯當得庚戌而杜氏以為辛巳辛巳實上年十二月也杜以隠元之前失閏故推勘經傳皆不合乃借前一月辛巳為隱元之正月朔而後合于五月之辛丑十月之庚申及二年十二月之乙卯三年二月之乙巳十二月之癸未五年十二月之辛巳六年五月之辛酉庚申七年七月之庚申與十二月之壬申辛巳然與二年八月之庚辰三年十二月之庚戌四年二月之戊申又不合也杜氏以為合者多而不合者少故從其多者而皆先一月以就之然與隠三年之二月己巳日食桓三年之七月壬辰朔日食及僖五年之九月戊申朔皆不合愚謂考厯以日食為主後之推厯者皆能上溯而得之非如日月之干支可諉之為𫝊冩之訛也若從杜厯則日食之不合者皆推不去矣因思隠元之前非失一閏乃多一閏耳莫如退一月以就之古厯隱元正月朔庚戌二月朔庚辰今退一月以庚辰為正月朔比杜氏辛巳朔實後兩月也則日食之不合者無不合而其中干支之或合或不合者亦與杜厯等殊為得之又按既退一月則冬至常在十二月與杜厯先一月則冬至常在二月等皆不免遷就之患然推至僖五年以後則冬至皆在正月矣宋趙子常名汸所著春秋屬辭内有日月差繆一條細開杜氏長厯及唐大衍厯日月異同與合朔日食經𫝊不同處頗稱詳宻今逐年録入以備㕘考但杜長厯久失𫝊而唐書大衍厯亦未載春秋厯考不知趙氏何本也豈别有所據耶隱二年庚申正大甲戌二小甲辰三大癸酉四小癸卯五大壬申六大壬寅七小壬申八大辛丑經庚辰杜氏云八月無庚辰庚辰七月九日九小辛未十大庚子十一小庚午十二大己亥經乙卯十七日閏小己巳杜氏云閏月庚午朔大衍厯閏十一月推古厯亦同隱三年辛酉正大戊戌二小戊辰經己巳日食己巳初二日三大丁酉經庚戌十四日𫝊壬戌二十六日四小丁卯經辛卯二十五日五大丙申六小丙寅七大乙未八小乙丑經庚辰十六日九大甲午十大甲子十一小甲午十二大癸亥經癸未二十一日𫝊庚戌十八日經書二月己巳日食杜氏云不書朔官失之穀梁云言日不言朔食晦日也朔日並不言食二日也姜岌校春秋日食云是嵗二月己亥朔無己巳似失一閏三月己巳朔去交分入食限大衍與姜氏合郭守敬授時厯云是嵗三月己巳朔加時在晝去交分二十六日六千六百三十一入食限按古厯三月當戊辰朔二日得己巳此退一月筭則二月即戊辰朔也己巳日食在二日杜厯得己巳則先一月故耳姜氏等所推三月己巳日食從定朔也大衍厯三月小己巳朔經三月庚戌在四月四月辛卯在五月八月大丙申朔經八月庚辰在九月十二月大甲午朔經十二月癸未在明年正月此以大衍厯法推春秋故多不合隠四年壬戌正小癸巳二大壬戌經戊申杜云在三月十七日三小壬辰四大辛酉五小辛卯六大庚申七小庚寅八大己未九小己丑十大戊午十一小戊子十二大丁巳杜氏曰二月戊申在三月十七日有日而無月葢以上年十二月有癸未則此年二月無戊申戊申書衛事不蒙上文二月莒人伐杞故曰有日而無月隱五年癸亥正小丁亥二大丙辰三大丙戌四小丙辰五大乙酉六小乙卯七大甲申八小甲寅九大癸未十小癸丑十一大壬午十二小壬子經辛巳閏月朔杜氏云二十九日蓋前一月筭故閏大辛巳大衍厯閏八月杜厯閏十二月今從之隠六年甲子正小辛亥二大庚辰三小庚戌四大己卯五大己酉經辛酉十三日𫝊庚申十二日六小己卯七大戊申八小戊寅九大丁未十小丁丑十一大丙午十二小丙子隠七年乙丑正大乙巳二小乙亥三大甲辰四小甲戌五大癸卯六小癸酉七大壬寅𫝊庚申十九日八小壬申九大辛丑十大辛未十一小辛丑十二大庚午𫝊壬申初三日辛巳十二日閏小庚子大衍閏下年四月古厯亦然今從杜厯隠八年丙寅正大己巳二小己亥三大戊辰經庚寅二十三日四小戊戌𫝊甲辰初七日辛亥十四日甲寅十七日五大丁卯六小丁酉經己亥初三日辛亥十五日七大丙寅經庚午初五日八小丙申𫝊丙戌在七月九大乙丑經辛夘二十七日十小乙未十一大甲子十二大甲午杜氏云八月丙戌誤上有七月庚午下有九月辛卯則八月不得有丙戌丙戌在七月二十日或九月二十一日紀鄭事也大衍厯此年閏四月五月小己亥朔經六月己亥辛亥在此月六月大戊辰朔經七月庚午在此月八月大丁卯朔經九月辛卯在此月此自以其定閏定朔推之故不與春秋厯相合也下皆倣此隠九年丁卯正小甲子二大癸巳三小癸亥經癸酉十一日庚辰十八日四大壬辰五小壬戌六大辛卯七小辛酉八大庚寅九小庚申十大己丑閏小己未十一大戊子𫝊甲寅二十七日十二小戊午按古厯此年不應閏大衍厯亦不閏杜氏置閏于十月以合于十一月之甲寅也此以前皆先一月今補一閏則月皆從其本朔大衍厯三月小甲午朔經癸酉庚辰在四月隱十年戊辰正大丁亥𫝊癸丑二十七日二小丁巳三大丙戌四大丙辰五小丙戌六大乙卯經壬戌初八日辛未十七日辛巳二十七日𫝊戊申誤庚午十六日庚辰二十六日七小乙酉𫝊庚寅初六日八大甲寅𫝊壬戌初九日癸亥初十日九小甲申𫝊戊寅杜云九月無戊寅戊寅在八月十大癸丑經壬午三十日十一小癸未十二大壬子𫝊六月戊申杜氏云六月無戊申戊申五月二十二日按此年為一章之終當閏十二月大衍厯閏在下年正月杜厯不閏而置之桓元年之末以從經𫝊日月不論章法矣通春秋一書皆然然前後推移終不越乎章蔀之外故逐年閏法雖多隨杜之遷就而仍考古章蔀以稽其得失其太疎太宻者亦按法損益之亦不必盡從杜氏其大衍厯雖與春秋不合然其厯與章蔀之法稍近故並附記之隱十一年己巳正小壬午二大辛亥三小辛巳四大庚戌五小庚辰𫝊甲辰二十五日六大己酉七小己卯經壬午初四日𫝊庚辰初二日八大戊申九大戊寅十小戊申𫝊壬戌十六日十一大丁丑經壬辰十六日十二小丁未大衍厯閏正月七月大庚戌朔十一月大戊申朔桓元年庚午正大丙子二小丙午三大乙亥四小乙巳經丁未初三日五大甲戌六小甲辰七大癸酉八小癸卯九大壬申十小壬寅十一大辛未十二大辛丑閏小辛未杜厯此年及桓七年皆閏十二月兩閏相去六年若于中桓四年補一閏率則三年一閏也説見桓五年大衍厯四月大丙子朔經丁未在五月桓二年辛未正大庚子經戊申初九日二小庚午三大己亥四小己巳經戊申杜云戊申在五月初十日五大戊戌六小戊辰七大丁酉八小丁卯九大丙申十小丙寅十一大乙未十二小乙丑大衍厯四月大庚午朔經戊申在五月是年閏九月推古厯亦當閏九月杜以上年既閏故此年不閏然則桓四年之一閏不可少也桓三年壬申正大甲午二小甲子三大癸巳四大癸亥五小癸巳六大壬戌七小壬辰經壬辰朔日食八大辛酉九小辛卯十大庚申十一小庚寅十二大己未經書七月壬辰朔日有食之既姜氏以是嵗七月癸亥朔無壬辰亦失閏其八月壬辰朔去交分入食限大衍與姜氏合郭氏亦云是嵗八月壬辰朔加時在晝食六分十四秒按自隠三年二月己巳日食至此年七月壬辰朔日食相距一百四十一月大衍與古厯合但前後皆後一月耳則以其厯法之不同也今日食在七月與經合桓四年癸酉正小己丑二大戊午三小戊子四大丁巳五小丁亥六大丙辰七大丙戌八小丙辰九大乙酉十小乙卯十一大甲申十二小甲寅閏大補癸未桓五年甲戌正小癸丑經甲戌己丑甲戌二十二日己丑從赴二大壬午三小壬子四大辛巳五小辛亥六大庚辰七小庚戌八大己卯九小己酉十大戊寅十一大戊申十二小戊寅經書正月甲戌己丑陳侯鮑卒杜氏云甲戌前年十二月二十一日己丑此年正月六日陳亂故再赴按杜氏自桓元年閏十二月至桓七年始復閏十二月相去凡六年其中必失一閏若以此年正月為甲申朔六日得己丑無甲戌則次年八月之壬午九月之丁卯七年二月之己亥皆不合愚于前年補閏十二月為癸未朔此年正月癸丑朔二十二日得甲戌其己丑為再赴之誤不必辨則六年七年之月日皆合矣似為得之大衍厯是年閏六月推古厯亦同今從杜厯置桓七年末正月小乙卯朔己卯日冬至經己丑在二月桓六年乙亥正大丁未二小丁丑三大丙午四小丙子五大乙巳六小乙亥七大甲辰八小甲戌經壬午初九日九大癸卯經丁卯二十五日十小癸酉十一大壬寅十二小壬申大衍厯八月大乙巳朔九月小乙亥朔桓七年丙子正大辛丑二小辛未經己亥二十九日三大庚子四大庚午五小庚子六大己巳七小己亥八大戊辰九小戊戌十大丁卯十一小丁酉十二大丙寅閏小丙申大衍厯閏在明年三月今從杜厯閏此年末大衍厯二月大壬寅朔經己亥在三月桓八年丁丑正大乙丑經己卯十五日二小乙未三大甲子四小甲午五大癸亥經丁丑十五日六大癸巳七小癸亥八大壬辰九小壬戌十大辛卯十一小辛酉十二大庚寅大衍厯是年閏三月推古厯當閏二月今從杜厯大衍厯五月小乙未朔經丁丑在六月桓九年戊寅正小庚申二大己丑三小己未四大戊子五小戊午六大丁亥七小丁巳八大丙戌九小丙辰十大乙酉十一大乙卯十二小乙酉桓十年己卯正大甲寅經庚申初七日二小甲申三大癸丑四小癸未五大壬子六小壬午七大辛亥八小辛巳九大庚戌十小庚辰十一大己酉十二小己卯經丙午二十八日閏大戊申大衍厯正月大乙酉朔乙巳日冬至經庚申在二月大衍厯是年閏十一月推古厯亦然杜厯置閏于下年正月今于是年十二月閏以合三年一閏之數桓十一年庚辰正大戊寅二小戊申三大丁丑四小丁未五大丙子經癸未初八日六小丙午七大乙亥八小乙巳九大甲戌𫝊丁亥十四日己亥二十六日十小甲辰十一大癸酉十二小癸卯桓十二年辛巳正大壬申二小壬寅三大辛未四小辛丑五大庚午六大庚子經壬寅初三日七小庚午經丁亥十八日八大己亥經壬辰杜氏云八月無壬辰壬辰在七月二十三日九小己巳十大戊戌十一小戊辰經丙戌十九日十二大丁酉經丁未十一日閏小丁卯杜厯置閏于下年正月然于經𫝊日月無據今置此年之末大衍厯六月大辛未朔經壬寅在七月七月小辛丑朔經丁亥在八月十一月小己亥朔經丙戌在十月十二月大戊辰朔經丁未在十一月桓十三年壬午正大丙申二小丙寅經己巳初四日三大乙未四小乙丑五大甲午六小甲子七大癸巳八小癸亥九大壬辰十大壬戌十一小壬辰十二大辛酉大衍厯是年閏七月推古厯亦同今置上年末桓十四年癸未正小辛卯二大庚申三小庚寅四大己未五小己丑六大戊午七小戊子八大丁巳經壬申十六日乙亥十九日九小丁亥十大丙辰十一小丙戌十二大乙卯經丁巳初三日大衍厯八月大戊子朔經壬申乙亥在九月十二月大丙戌朔經丁巳在十一月朔或明年正月初二日桓十五年甲申正大乙酉二小乙卯三大甲申經乙未十二日四小甲寅經己巳十六日五大癸未六小癸丑𫝊乙亥二十三日七大壬午八小壬子九大辛巳十小辛亥十一大庚辰十二小庚戌閏大己卯大衍厯正月丙辰朔三月大乙卯朔經乙未在四月四月小乙酉朔經己巳在五月杜厯閏在明年六月恐太疎今置此年末以成三年一閏之例且于經𫝊日月無碍桓十六年乙酉正小己酉二大戊寅三小戊申四大丁丑五大丁未六小丁丑七大丙午八小丙子九大乙巳十小乙亥十一大甲辰十二小甲戌大衍厯是年閏四月古厯亦閏四月今已置上年末桓十七年丙戌正大癸卯經丙辰十四日二小癸酉經丙午誤三大壬寅四小壬申五大辛丑經丙午初六日六小辛未經丁丑初七日七大庚子八大庚午經癸巳二十四日九小庚子十大己巳經日食書朔不書日十一小己亥十二大戊辰經二月丙午杜氏云二月無丙午丙午三月四日也日月必有誤葢據五月有丙午六月有丁丑則丙午不在二月而在三月可知其云初四日者以三月朔為癸卯也或丙子誤丙午經冬十月朔日有食之左氏云不書日官失之大衍推得十一月庚午朔日食失閏也郭氏云是年十一月不言日加時在晝交分二十六日八千五百六十分入食限按庚午為八月朔己前兩月矣十月初二日得庚午或食在二日也然與經朔字不合按自桓三年七月壬辰朔日食至此年十月庚午日食推古厯相距一百七十六月大衍亦同杜厯少一月則知前桓四年一閏不可不補也大衍厯正月小乙亥朔壬午日冬至經丙辰在二月五月小癸酉朔經丙午在六月六月大壬寅朔經丁丑在七月八月大辛丑朔經癸巳在九月十月大庚子朔日食在十一月庚午朔桓十八年丁亥正小戊戌二大丁卯三小丁酉四大丙寅經丙子十一日丁酉入五月五小丙申經丁酉杜氏云丁酉五月初二日有日而無月不蒙上夏四月之文也六大乙丑七小乙未𫝊戊戌初四日八大甲子九小甲午十大癸亥十一小癸巳十二大壬戌經己丑二十八日大衍厯四月大丁酉朔經丙子在五月丁酉在六月十二月大癸巳朔經己丑在十一月二十六日按章法桓十八年當閏十二月今省之以就杜厯春秋長厯卷九
