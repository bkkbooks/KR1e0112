body:
  text: 春秋長厯卷七右諭徳陳厚耀撰厯編五襄二十五年癸丑正大辛酉二小辛夘三大庚申四小庚寅五大己未經乙亥十七日傳甲戌十六日丁丑十九日辛巳二十三日丁亥二十九日六小己丑經壬子二十四日七大戊午傳己巳十二日八小戊子經己巳六月有壬子則八月無己巳傳繋七月是𫝊甲午初七日九大丁巳十小丁亥十一大丙辰十二小丙戌襄二十六年甲寅正大乙夘二小乙酉經辛夘初七日甲午初十日傳庚寅初六日三大甲寅𫝊甲寅朔四大甲申五小甲寅六大癸未七小癸丑八大壬午經壬午即朔日九小壬子十大辛巳十一小辛亥十二大庚辰𫝊乙酉初六日閏小庚戌襄二十七年乙夘正大己夘二大己酉三小己夘四大戊申五小戊寅傳甲辰二十七日丙午二十九日六大丁未傳丁未朔戊申初二日甲寅初八日丙辰初十日壬四日壬申二十六日戌十六日丁夘二十一日戊辰二十二日庚午二十七小丁丑經辛巳初五日傳戊寅初二日壬午初六日乙酉初九日八大丙午九小丙子傳庚辰初五日辛巳初六日十大乙巳十一小乙亥十二大甲辰經乙亥朔日食傳在十一月經書十二月乙亥朔日有食之傳書十一月乙亥朔日有食之杜氏云今長厯推得十一月朔非十二月姜氏云十一月乙亥朔交分入食限大衍厯同郭氏亦云是年十一月乙亥朔加時在晝交分初日八百二十五分入食限傳曰辰在申司厯過也再失閏矣杜氏云謂斗建指申周十一月夏之九月斗當建戌而在申故知再失閏也若是十二月則為三失閏矣又云文十一年三月甲子至今年七十一嵗應有二十六閏今長厯推得二十四閏通計少再閏釋例言之詳矣孔氏云厯十九年為一章章有七閏從文十一年至襄十三年凡五十七年已成三章當有二十一閏又從襄十四年至今十四年又當有五閏故應有二十六閏也長厯推得二十四閏者杜以長厯實于其間分置二十四閏按二十四閏者文十二十六宣二五十十二十五成元四七九十二十四十七襄二五七十十三十六十九二十一二十四二十六共二十四閏釋例云魯之司厯漸失其閏至此年日食之月始覺其謬遂頓置兩閏以應天正前閏月為建酉後閏月為建戌十二月為建亥而嵗終焉是故明年經書春無氷𫝊以為時災若不復頓置兩閏則明年春是今之九月十月矣十一月無氷非天時之異無縁總書春也劉氏云厯家之術求閏餘易求交人食難今司厯能正交朔反不能置閏非人情也閏有章凖率三十二月一逢如𫝊所言再失閏者則司厯廢閏殆七十月彌五年矣亦非人情也明年春無氷杜氏云頓置兩閏以應天正故正月建子得以無氷為災頓置兩閏詭聽駭俗亦非人情也啖氏云按𫝊于此言司厯過也哀十三年又記仲尼曰司厯過也皆指王朝厯官與桓十七年𫝊曰官失之也意同其曰天子有日官諸侯有日御日官居卿以底日日御不失日以授百官于朝則所謂司厯與官非謂魯人明矣杜氏乃以為魯之司厯哀十三年𫝊註又云季孫雖聞仲尼之言而不正閏皆謂魯自有厯實承劉歆之誤而非𫝊意也劉氏之説見漢書律厯志其所𫝊魯厯不與春秋相符杜氏亦以為好事者為之竊謂周室雖衰猶君臨列國崩薨卒葬皆告諸侯必無不頒厯之理借令喪亂之際頒不以時諸侯亦必不敢輒自為歴使諸侯皆自為厯則齊晉大國當先為之如大國皆自為厯而所差往往若此則當時所書盟㑹卒葬日月魯史當以何國為正使魯史所書日月差錯與周厯不同韓宣子見魯春秋何以輒曰周禮盡在魯矣此必無之事也按頓置兩閏成何厯法洵乎詭聽不知杜氏何據云此且以日食校之襄此年十一月乙亥朔日食大衍厯與杜厯同此十二年間皆置閏者四年月相當若復増兩閏則二厯之日食必不合矣此以知魯歴必無是也又按周厯雖失閏然止可差一閏不得差再閏若失閏兩月則冬至常在三月而立春至于五月矣司厯者謬不至此其所以斗當在戌而在申者蓋春秋時嵗差之法未行天度已漸移而人不知又或失一閏則占候者遂以兩失閏矣又按魯人使既補兩閏則厯已正矣而哀十二年十二月螽仲尼又曰火猶西流司厯過也豈正厯之後不七十年而又差一月耶補閏之説誠未可信也襄二十八年丙辰正小甲戌二大癸夘三大癸酉四小癸夘五大壬申六小壬寅七大辛未八小辛丑九大庚午十小庚子傳丙辰十七日十一大己巳𫝊乙亥初七日丁亥十九日癸巳二十五日十二小己亥𫝊乙亥朔乙經甲寅十六日未傳十二月乙亥朔杜氏云十二月戊戌朔乙亥誤十二月無乙未日誤劉氏以此年之前當有閏月然推勘上下日月不得有閏也趙子常曰甲寅距乙未四十二日此中有閏月胡𫝊亦以乙未為閏十二月之日也按襄二十九年有閏則此年不得有閏經之己未誤乙傳之己亥亦誤乙也若置一閏以合于經傳則二十九年之日皆不合矣襄二十九年丁巳正大戊辰二小戊戌傳癸夘初六日三大丁夘四小丁酉五大丙寅經庚午初五日六小丙申七大乙丑八大乙未閏小乙丑九大甲午𫝊乙未初二日十小甲子傳庚寅二十七日十一大癸巳傳乙夘二十三日十二小癸亥𫝊己巳初七日大衍厯是年閏五月古厯閏四月襄三十年戊午正大壬辰二小壬戌𫝊癸未二十二日三大辛夘四小辛酉𫝊己亥已當作乙十五日五大庚寅經甲午初五日𫝊癸巳初四日六小庚申七大己丑𫝊庚子十二日辛丑十三日壬寅癸丑二十五日十四日癸夘十五日乙巳十七日八小己未傳甲子初六日己巳十一日九大戊子十大戊午十一小戊子十二大丁巳傳二月癸未晉悼夫人食輿人之城杞者絳縣人或年長矣往與于食使言其年曰臣生之嵗正月甲子朔四百有四十五甲子矣其季于今三之一也吏走問諸朝師曠曰七十三年矣士文伯曰然則二萬六千六百有六旬也杜氏云所稱正月謂夏正月也孔氏云文十一年至此年為七十四年而云七十三年者按文十一年正月甲子朔為夏之正月是其年三月也此年之二月癸未是夏之十二月計七十三年猶未終也劉待制曰季末也今今日也謂已得四百四十四全甲子其末一甲子六十日而今日乃癸未纔得二十日也故曰三之一林氏曰四百四十五甲子合得二萬六千七百日以其末三分六甲之一故少四十日實得二萬六千六百六十日也按正月甲子是周之三月則晉人猶用夏正月也竊意春秋時周正夏正列國互用故所書多不合大率差兩月者居多考之往古詩書皆用夏正其以建子月為正月實始于東遷後時王之制非文武之制也若果國初文武之制豈以孔子從周之民而敢曰行夏之時耶周初用十一月為嵗首而不改月亦不改時仍稱冬十一月但以此為嵗首耳蔡九峯辨之甚詳襄三十一年己未正小丁亥二大丙辰三小丙戌四大乙夘五小乙酉六大甲寅經辛巳二十八日七小甲申八大癸丑九小癸未經癸巳十一日己亥十七日十大壬子經癸酉二十二日十一小壬午十二大辛亥古厯是年閏十二月昭元年庚申正小辛巳𫝊乙未十五日二大庚戌三大庚辰𫝊甲辰二十五日四小庚戌五大己夘傳庚辰初二日癸夘二十五日六小己酉經丁己初九日七大戊寅八小戊申九大丁丑十小丁未十一大丙子經己酉杜氏云長厯推己酉在十二月六日經𫝊皆言十一月月誤也十二小丙午𫝊甲辰朔不合庚戌初五日杜氏云七日閏大乙亥大衍厯是年閏正月大衍厯閏正月大庚戌朔與此合五月大戊申朔經丁巳在此月按𫝊言十二月甲辰朔烝于温今推得十二月丙子朔相去四个月後丙午四个月得甲辰朔縱如杜氏襄二十七年補置兩閏之説當得乙巳朔非甲辰朔也不知杜厯如何推去昭二年辛酉正小乙巳二大甲戌三小甲辰四大癸酉五小癸夘六大壬申七大壬寅𫝊壬寅即朔日八小壬申九大辛丑十小辛未十一大庚子十二小庚午昭三年壬戌正大己亥經丁未初九日二小己巳三大戊戊四小戊辰五大丁酉六小丁夘七大丙申八小丙寅九大乙未十大乙丑十一小乙未十二大甲子大衍厯是年閏九月古厯亦同杜閏在明年昭四年癸亥正小甲午二大癸亥三小癸巳四大壬戌閏小壬辰五大辛酉六小辛夘傳丙午十六日七大庚申八小庚寅𫝊甲申杜氏云八月無甲申甲申朔也在七月二十六日則以七月己未九大己未十小己丑十一大戊午十二小戊子經乙夘二十八日𫝊癸丑二十六日昭五年甲子正大丁巳二大丁亥三小丁巳四大丙戌五小丙辰六大乙酉七小乙夘經戊辰十四日八大甲申九小甲寅十大癸未十一小癸丑十二大壬午昭六年乙丑正小壬子二大辛巳三小辛亥𫝊壬子初二日見昭七年𫝊四大庚辰五大庚戌六小庚辰𫝊丙戌初七日七大己酉閏小己夘八大戊申九小戊寅十大丁未十一小丁丑十二大丙午大衍厯是年閏六月古厯亦同昭七年丙寅正小丙子傳癸巳十八日壬寅二十七日二大乙巳𫝊戊午十四日三小乙亥四大甲辰經甲辰朔日食五小甲戌六大癸夘七小癸酉八大壬寅經戊辰二十七日九大壬申十小壬寅傳辛酉二十日十一大辛未經癸未十三日十二小辛丑經癸亥二十三日經四月甲辰朔日有食之大衍厯同郭氏亦云是月甲辰朔加時在晝交分二十七日二百九十八分入食限昭八年丁夘正大庚午二小庚子三大己巳𫝊甲申十六日四小己亥經辛丑初三日𫝊辛亥十三日五大戊辰六小戊戌七大丁夘𫝊甲戌初八日丁丑十一日丁丑十一日八小丁酉𫝊庚戌十四日九大丙寅十小丙申經壬午杜氏云壬午月十八日𫝊繫十一月誤則以八月後置一閏也十一大乙丑𫝊壬午十八日十二小乙未杜厯是年閏八月今移下年末説見後昭九年戊辰正大甲子二大甲午庚申二十七日三小甲子四大癸巳五小癸亥六大壬辰七小壬戌八大辛夘九小辛酉十大庚寅十一小庚申十二大己丑閏小移己未經書夏四月陳災𫝊言火出而火陳杜氏云火出于周為五月而以四月出者以長厯推上年誤置閏閏當在此年三月後按杜以上年誤置一閏者蓋推勘上下日月而知之故于上年閏八月以合于經之十月壬午然合于經之十月壬午而不合于傳之十一月壬午及九年之二月庚申十年之七月戊子十二月之甲子不知如何推去愚以上年不必置閏壬午從傳在十一月則九年之二月庚申皆合却于九年末置一閏以合于十年之月日則兩得之矣今僭易之亦遵杜説也大衍厯是年閏三月古厯閏二月知閏當在此年昭十年己巳正大戊子二小戊午三大丁亥四大丁巳五小丁亥𫝊庚辰五月無庚辰似誤六大丙辰七小丙戌經戊子初三日八大乙夘九小乙酉十大甲寅十一小甲申十二大癸丑經甲子十二日昭十一年庚午正小癸未二大壬子三小壬午傳丙申十五日四大辛亥經丁巳初七日五小辛巳經甲申初四日六大庚戌七小庚辰八大己酉九大己夘經己亥二十一日十小己酉十一大戊寅經丁酉二十日十二小戊申大衍厯是年閏十二月古厯閏十一月杜閏明年昭十二年辛未正大丁丑閏小丁未二大丙子三小丙午經壬申二十七日四大乙亥五小乙巳六大甲戌七小甲辰八大癸酉𫝊壬午初十日九小癸夘十大壬申傳壬申朔二丙申二十五日丁酉十六日十一大壬寅十二小壬申昭十三年壬申正大辛丑二小辛未三大庚子四小庚午五大己亥𫝊癸亥二十五日乙夘十七日丙辰十八日六小己巳七大戊戌𫝊丙寅二十九日八小戊辰經甲戌初七日𫝊辛未初四日壬申初五日九大丁酉十小丁夘十一大丙申十二小丙寅經書夏四月楚公子比自晉歸于楚弑其君䖍于乾谿傳曰夏五月王縊于􅇗尹申亥氏乙夘夜國人大驚子干子晳皆自殺丙辰棄疾即位杜氏云癸亥五月二十六日杜以五月為戊戌朔實在乙夘丙辰之後傳先言之者因申亥求王遂言王縊是傳終言之也既以五月統癸亥日而乙夘丙辰亦是五月之日雖言有顛倒皆蒙此五月之文也昭十四年癸酉正大乙未二小乙丑三大甲午四大甲子五小甲午六大癸亥七小癸巳八大壬戌九小壬辰傳甲午初三日十大辛酉十一小辛夘十二大庚申大衍厯是年閏七月古厯亦同杜閏在明年昭十五年甲戌正小庚寅二大己未經癸酉十五日三小己丑四大戊午五小戊子六大丁巳經丁巳朔日食𫝊乙丑初九日七小丁亥八大丙辰𫝊戊寅二十二日九大丙戌閏小丙辰十大乙酉十一小乙夘十二大甲申經書六月丁巳朔日有食之大衍厯推五月丁巳朔食失一閏郭氏亦云今厯推之是年五月丁巳朔加時在晝交分十三日九千五百六十七分入食限按大衍厯閏在日食之前故日食在五月杜厯閏在日食之後故日食在六月昭十六年乙亥正小甲寅二大癸未𫝊丙申十四日三小癸丑四大壬午五小壬子六大辛巳七小辛亥八大庚辰經己亥二十日九小庚戌十大己夘十一大己酉十二小己夘昭十七年丙子正大戊申二小戊寅三大丁未四小丁丑五大丙午六小丙子經甲戌朔日食七大乙巳八小乙亥九大甲辰傳丁夘二十四日十小甲戌十一大癸夘十二小癸酉大衍厯五月大丙午朔閏五月小丙子朔六月小乙己朔九月小甲戌朔古厯是年閏四月經夏六月甲戌朔日有食之姜氏云六月乙己朔交分不叶不應食當誤大衍厯云六月乙巳朔不應食姜氏是也當在九月甲戌朔日食黄道婁四度郭氏亦云是年九月甲戌朔加時在晝交分二十六日七千六百五十分入食限徐圃臣曰當是昭十五年六月日食移此而誤也按昭十五年並無甲戌朔經書六月丁巳與此無渉徐説非也此日食姑闕疑昭十八年丁丑正大壬寅閏小壬申此閏可置上年末二大辛丑傳乙夘十五日三大辛未四小辛丑五大庚午經壬午十三日𫝊丙子初七日戊寅初九日六小庚子七大己巳八小己亥九大戊辰十小戊戌十一大丁夘十二小丁酉昭十九年戊寅正大丙寅二小丙申三大乙丑四小乙未五大甲子經戊辰初五日己夘十六日𫝊乙亥十二日六大甲午七小甲子𫝊丙子十三日八大癸巳九小癸亥十大壬辰十一小壬戌十二大辛夘推古厯是年當閏十二月大衍厯閏明年二月昭二十年己夘正小辛酉二大庚寅𫝊己丑日南至不合誤己丑在正月二十九日正月作二三小庚申四大己丑五小己未六大戊子𫝊丙申初九日癸夘十六日丙辰二十九日丁巳晦七小戊午𫝊戊午朔八大丁亥𫝊辛亥二十五日閏小丁巳傳閏月日戊辰十二九大丙戌十大丙辰𫝊戊辰十三日十一小丙戌經辛夘初六日十二大乙夘傳春王二月己丑日南至杜氏云是嵗朔旦冬至之嵗也當言正月己丑朔日南至時史失閏閏更在二月後故傳于二月記南至日以正厯也孔氏云厯法十九年為一章章首之嵗必正月朔旦冬至僖五年正月辛亥朔日南至是章首之年計僖五年至上年昭十九年合一百三十三年是為七章今年復為章首當言正月己丑朔日南至今𫝊乃云二月己丑日南至是錯名正月為二月也厯之正法章首上年十二月後宜置一閏則此年正月當是上年閏月此年二月乃是正月時史失閏上年錯不置閏傳于八月之下乃云閏月戊辰殺宣姜是閏在二月後也按古之推厯者皆以僖五年正月辛亥朔日南至為朔旦冬至是章首之年亦蔀首之年也至今昭二十年一百三十三年共有七章除去四章為一蔀餘三章閏餘尚畸四分之一則昭之二十年雖為章首而非朔旦冬至之年傳言己丑未嘗言朔而杜遽加以朔旦何也且此年並非章首也春秋之時厯法章蔀乖次久矣若果為章首之年則此年何得有閏八月乎𫝊所以特紀此年南至者原非以正厯之故因此日梓慎望氛預知宋亂蔡喪之故耳若必以己丑為二月朔則下文日月及戊午朔皆推不去矣愚以己丑為正月晦日是日冬至傳誤書正月為二月不過一字之訛與孔氏錯名正月為二月之説同考大衍厯亦云正月二十九日己丑冬至也大衍厯是年正月小辛酉朔二十九日己丑冬至二月大庚寅朔閏二月小庚申朔三月己丑朔四月己未朔五月戊子朔六月戊午朔與此俱同傳六月丙辰衛侯在平夀云云丁巳晦公入與北宫喜盟于彭水之上秋七月戊午朔遂盟國人孔氏曰丙辰丁巳乃是頻日其事既多不應二日之中并為此事今杜不云日誤者以誤在可知且宣二年壬申朝于武宫注云壬申十月五日有日而無月冬又在壬申下明𫝊文無較例又注哀十二年𫝊云此事經在二月螽上今倒在下更具列其月以為别者傳本不以為義例故不與齊同如杜此言或𫝊因簡牘之辭不復具顯其日月趙子常曰此説得之而未盡故劉侍讀每疑𫝊妄説見二十三年昭二十一年庚辰正小乙酉二大甲寅三小甲申四大癸丑五小癸未傳丙申十四日壬寅二十日六大壬子傳庚午十九日七小壬午經壬午朔日食八大辛亥經乙亥二十五日九小辛巳十大庚戌傳丙寅十七日十一小庚辰𫝊癸未初四日丙戌初七日十二大己酉經秋七月壬午朔日有食之大衍厯同郭氏亦云是月壬午朔加時在晝交分二十六日八千七百九十四分入食限昭二十二年辛巳正小己夘二大戊申傳甲子十七日己巳二十二日三小戊寅四大丁未經乙丑十九日𫝊戊辰二十二日五小丁丑傳庚辰初四日六大丙午傳丁巳十二日壬戌十七日癸亥十八日乙丑二十日辛未二十六日乙亥三十日七小丙子𫝊戊寅初三日辛夘十六日壬辰十七日八大乙巳𫝊辛酉十七日己巳二十五日庚午二十六日辛未二十七日九小乙亥十大甲辰𫝊丁巳十四日庚申十七日十一小甲戊𫝊乙酉十二日己丑十六日十二大癸夘經癸酉朔日食𫝊庚戌初八日閏小癸酉𫝊閏月九辛丑二十日大衍厯七月小丙子朔十月大甲辰朔閏十月大甲戌朔十一月小甲辰朔十二月大癸丑朔古厯閏九月經十有二月癸酉朔日有食之杜氏云以長厯推校前後當為癸夘朔書癸酉誤孔氏云庚戌上去癸酉三十七日若此月癸酉朔其月不得有庚戌又傳十二月下有閏月辛丑辛丑是壬寅之前日也二十三年傳正月壬寅朔則辛丑是閏月之晦日也又計明年正月之朔與今年十二月朔中有一閏相去五十九日此年十二月當為癸夘朔經書癸酉明是誤也大衍厯十二月癸酉朔日食黄道箕四度半强郭氏亦云是月癸酉朔交分十四日一千八百入食限杜預以長厯推得癸夘非是按大衍授時二厯推是年日食皆得癸酉而杜氏以為癸夘則以閏月前後之不同也二厯閏在日食前故十二月即癸酉杜厯閏在日食後故十二月得癸夘杜之不復移閏在前者以閏十二月見𫝊不可改移故以癸酉為癸夘之誤不知日食自有一定之交分相距之定日非可差一月也杜不曉推日食而但以經𫝊之日月校之則失之矣經當書閏十二月癸酉朔日食失一閏字非夘誤為酉且校之前年七月壬午朔日食與二十四年之五月乙未朔日食無不與大衍合則十二月之為癸酉無疑昭二十三年壬午正大壬寅傳壬寅朔經癸丑十二日𫝊癸九日夘初二日丁未初六日庚戌初二大壬申三小壬寅四大辛未𫝊乙酉十五日五小辛丑六大庚午𫝊壬午十三日癸未十四日丙戌十七日己丑二十日庚寅二十一日甲午二十五日七小庚子經戊辰晦二十九日傳戊中初九日丙辰十七日甲子二十五日丙寅二十七日八大己巳經乙末二十七日𫝊丁酉二十九日九小己亥十大戊辰𫝊甲申十七日十一小戊戌十二大丁夘經春王正月叔孫婼如晉傳春王正月壬寅朔二師圍郊癸夘郊鄩潰丁未晉師在平隂王師在澤邑王使告間庚戌還邾人城翼還自離姑武城人取邾師邾人愬于晉晉人來討經癸丑晉人執我行人叔孫婼劉氏云是年正月有壬寅朔有庚戌有癸丑傳叙邾事在庚戌之後經記叔孫如晉在癸丑之前夫庚戌癸丑四日耳邾人已能訢于晉晉人已能來討何其神速也故曰不然趙子常云按左氏採衆記以釋經其附麗斷截皆以經為主或先經以始事或後經以終義則所記之事各有本末自不容以日月次其先後如此年𫝊自壬寅朔至庚戌還是記晉人圍郊本末自邾人城翼至晉人來討是原叔孫如晉之由非謂邾人城翼以後之事皆在庚戌後也如劉侍讀所難則作傳者必如近代所修日厯而後可昭二十四年癸未正小丁酉𫝊辛丑初五日戊午二十二日二大丙寅經丙戌二十一日三小丙申𫝊庚戌十五日四大乙丑五小乙未經乙未朔日食六大甲子傳壬申初九日七小甲午八大癸亥經丁酉杜氏云丁酉九月五日有日而無月九大癸巳十小癸亥𫝊癸酉十一日甲戌十二日十一大壬辰十二小壬戌經五月乙未朔日有食之大衍厯同郭氏亦云是月乙未朔交分二十六日三千八百三十九分入食限大衍厯八月小甲子朔經丁酉在九月昭二十五年甲申正大辛夘二小辛酉三大庚寅四小庚申五大己丑六小己未七大戊子八小戊午九大丁亥經己亥十三日𫝊戊戌十二日十小丁巳經戊辰十二日𫝊辛酉初五日壬申十六日十一大丙戌經己亥十四日十二大丙辰𫝊庚辰二十五日閏小丙戌大衍厯原本是年缺閏以前後推之當閏六月古厯閏六月大衍厯八月小戊子朔九月大丁巳朔經己亥在八月十月小丁亥朔經戊辰在九月十一月大丙辰朔經己亥在十月昭二十六年乙酉正大乙夘𫝊庚申初六日二小乙酉三大甲寅四小甲申五大癸丑𫝊戊午初六日戊辰十六日六小癸未七大壬子𫝊己巳十八日庚午十九日丙子二十五日丁丑二十六日庚辰二十九日辛巳三十日八小壬午九大辛亥經庚申初十日十小辛巳𫝊丙申十六日辛丑二十一日十一大庚戌傳辛酉十一日癸酉二十四日甲戌二十五日十二小庚辰𫝊癸未初四日昭二十七年丙戌正大己酉二小己夘三大戊申四大戊寅五小戊申六大丁丑七小丁未八大丙子九小丙午傳己未十四日十大乙亥十一小乙巳十二大甲戌昭二十八年丁亥正小甲辰二大癸酉三小癸夘四大壬申經丙戌十五日五小壬寅閏大辛未六小辛丑七大庚午經癸巳二十四日八大庚子九小庚午十大己亥十一小己巳十二大戊戌大衍厯閏三月癸酉朔古厯閏二月昭二十九年戊子正小戊辰二大丁酉三小丁夘傳己夘十三日四大丙申經庚子初五日五小丙寅𫝊庚寅二十五日六大乙未七小乙丑八大甲午九小甲子十大癸巳十一大癸亥十二小癸巳昭三十年己丑正大壬戌二小壬辰三大辛酉四小辛夘五大庚申閏小庚寅六大己未經庚辰二十二日七小己丑八大戊午九小戊子十大丁巳十一小丁亥十二大丙辰𫝊己夘二十四日大衍厯閏十二月丁巳朔古厯閏十一月昭三十一年庚寅正小丙戌二大乙夘三大乙酉四小乙夘經丁巳初三日五大甲申六小甲寅七大癸未八小癸丑九大壬午十小壬子𫝊庚午十九日十一大辛巳十二小辛亥經辛亥朔日食經十有二月辛亥朔日有食之大衍厯同郭氏亦云是月辛亥朔交分二十六日六千一百二十八分入食限昭三十二年辛夘正大庚辰二小庚戌三大己夘四小己酉五大戊寅六大戊申七小戊寅八大丁未九小丁丑十大丙午十一小丙子𫝊己丑十四日十二大乙巳經己未十五日春秋長厯巻七
