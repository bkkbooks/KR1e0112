body:
  text: 春秋長厯卷二右諭徳陳厚耀撰古厯法古法十九年為一章至朔分齊四章為一蔀復得朔旦冬至二十蔀為一紀則日之干支復其初三紀為一元則年月日之干支皆復其初是為厯元章法十九年二百三十五月蔀法七十六年九百四十月紀法一千五百二十年一萬八千八百月元法四千五百六十年五萬六千四百月日法九百四十分嵗三百六十五日四分日之一即九百四十分日之二百三十五嵗法三十四萬三千三百三十五分月二十九日九百四十分日之四百九十九月法二萬七千七百五十九分嵗餘一萬二百二十七每嵗朔虚五千二百九十二分氣盈四千九百三十五分併之為嵗餘月餘八百五十二分二秒五忽毎月朔虚四百四十一分氣盈四百一十一分二杪五忽併之為月餘推天正入朔分置所求年從厯元數至此年為所求幾何年减一以嵗法乘之乃以月法收之為月餘不滿一月法者去之所得月復以月法乘之得數滿日法去之餘即天正入朔分以次逓加四百九十九滿日法去之即次月入朔分推冬至日及分置所求年减一以嵗法乗之加天正入朔分得數滿月法去之餘以日法收之為日加一日命之即所求冬至日及分推月大小視入朔分在四百四十一分以下為月大以上為月小推閏年閏月置所求年不减一以嵗餘乘之得數滿月法去之餘視不滿嵗餘者則置閏之年乃以月餘收之為月所得月以反减十二餘為所閏之月如滿嵗餘以外者此年不置閏其月法去之適盡者為蔀之末年閏十二月推至朔分齊之年以月法二萬七千七百五十九與嵗餘一萬二百二十七用約分法對减之各餘一千四百六十一以除月法得十九年為至朔分齊是為一章四倍之得七十六年為一蔀而得朔旦至朔分齊之日又以一千四百六十一除嵗餘得七為一章之閏推甲子年甲子月甲子日至朔分齊以蔀法七十六年乗嵗三百六十五日四分日之一得日二萬七千七百五十九以六十全甲之數去之餘日三十九却以全甲六十用約分法對减之各餘三以除全甲六十得二十再以二十乗七十六年得一千五百二十年而為甲子日至朔分齊是為一紀又以紀法一千五百二十用六十去之餘二十是全甲三之一也以三週一千五百二十年得四千五百六十年而為甲子年甲子日至朔分齊之年不言甲子月甲子時者冬至即子月合朔即子時也是為一元推毎蔀月朔相承捷法天干挨次逆推如甲至癸癸至壬是也地支隔三順推如子至卯卯至午是也皆週而復始按春秋厯蔀首月朔惟得申亥寅巳其子丑卯辰午未酉戌皆不值所謂甲子朔旦冬至竟為數之所無漢書殷厯周厯朔旦不同則三代所用之厯亦各有増减而朔旦四甲子必古有之而周厯不合耳又按三代改厯非重修厯法也其日法九百四十分及章蔀紀元之法初未嘗易漢太初厯猶仍其舊不過因測景冬至後天則移冬至朔旦于前一日以示改易之意如顓頊用甲寅殷用壬子周用辛亥之類葢古人未知有嵗差惟于數百年中減去一二日以求合天而厯法初不之改也改厯自後漢始推入朔分入何年何月附置入朔分以八百五十九乗之用八百五十九者推得八百五十九月則入朔餘一分逓乗之則逓増一分得數以蔀月九百四十去之餘月又以章月二百三十五收之餘月以章首年月數之即知入何章何年何月春秋古厯第一章首正月朔旦冬至恵三十八庚戌僖五丙寅成十二壬午定七戊戌正大九百四十分入朔壬申辛亥庚寅己巳二大四百四十九分入朔壬寅辛巳庚申己亥三小五十八分入朔壬申辛亥庚寅己巳四大五百五十七分入朔辛丑庚辰己未戊戌五小一百一十六分入朔辛未庚戌己丑戊辰六大六百一十五分入朔庚子己卯戊午丁酉七小一百七十四分入朔庚午己酉戊子丁卯八大六百七十三分入朔己亥戊寅丁巳丙申九小二百三十二分入朔己巳戊申丁亥丙寅十大七百三十一分入朔戊戌丁丑丙辰乙未十一小二百九十分入朔戊辰丁未丙戌乙丑十二大七百八十九分入朔丁酉丙子乙夘甲午一章二年正月十二日冬至恵三十九辛亥僖六丁卯成十三癸未定八己亥正小三百四十八分入朔丁卯丙午乙酉甲子二大八百四十七分入朔丙申乙亥甲寅癸巳三小四百六分入朔丙寅乙巳甲申癸亥四大九百五分入朔乙未甲戌癸丑壬辰五大四百六十四分入朔乙丑甲辰癸未壬戌六小二十三分入朔乙未甲戌癸丑壬辰七大五百二十二分入朔甲子癸卯壬午辛酉八小八十一分入朔甲午癸酉壬子辛卯九大五百八十分入朔癸亥壬寅辛巳庚申十小一百三十九分入朔癸巳壬申辛亥庚寅十一大六百三十八分入朔壬戌辛丑庚辰己未十二小一百九十七分入朔壬辰辛未庚戌己丑一章三年正月二十三日冬至恵四十壬子僖七戊辰成十四甲申定九庚子正大六百九十六分入朔辛酉庚子己卯戊午二小二百五十五分入朔辛卯庚午己酉戊子三大七百五十四分入朔庚申己亥戊寅丁巳四小三百一十三分入朔庚寅己巳戊申丁亥五大八百一十二分入朔己未戊戌丁丑丙辰六小三百七十一分入朔己丑戊辰丁未丙戌七大八百七十分入朔戊午丁酉丙子乙卯八小四百二十九分入朔戊子丁卯丙午乙酉九大九百二十八分入朔丁巳丙申乙亥甲寅閏大四百八十七分入朔丁亥丙寅乙巳甲申十小四十六分入朔丁巳丙申乙亥甲寅十一大五百四十五分入朔丙辰乙丑甲戌癸未十二小一百四分入朔丙戌乙未甲辰癸丑一章四年正月初四日冬至恵四十一癸丑僖八己巳成十五乙酉定十辛丑正大六百三分入朔乙酉甲子癸卯壬午二小一百六十二分入朔乙卯甲午癸酉壬子三大六百六十一分入朔甲申癸亥壬寅辛巳四小二百