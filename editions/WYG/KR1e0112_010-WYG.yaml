body:
  text: 春秋長厯卷十右諭徳陳厚耀撰長厯退兩月譜自莊元年至僖五年止莊元年戊子正大壬辰二小壬戌三大辛卯四小辛酉五大庚寅六小庚申七大己丑八小己未九大戊子十小戊午經乙亥十八日十一大丁亥十二小丁巳閏大丙戌大衍厯閏正月杜厯閏十月今置年末與經𫝊日月無碍莊二年己丑正小丙辰二大乙酉三小乙卯四大甲申五大甲寅六小甲申七大癸丑八小癸未九大壬子十小壬午十一大辛亥十二小辛巳經乙酉初五日大衍厯十二月大壬子朔經乙酉在十一月莊三年庚寅正大庚戌二小庚辰三大己酉四小己卯五大戊申六小戊寅七大丁未八大丁丑九小丁未十大丙子十一小丙午十二大乙亥閏小乙巳大衍厯是年閏九月推古厯亦同杜厯置明年四月似無據今置此年之未莊四年辛卯正大甲戌二小甲辰三大癸酉四小癸卯五大壬申六小壬寅經乙丑二十四日七大辛未八小辛丑九大庚午十小庚子十一大己巳十二大己亥大衍厯六月大癸酉朔經乙丑在七月莊五年壬辰正小己巳二大戊戌三小戊辰四大丁酉五小丁卯六大丙申七小丙寅八大乙未九小乙丑十大甲午十一小甲子十二大癸巳莊六年癸巳正小癸亥二大壬辰三大壬戌四小壬辰五大辛酉六小辛卯七大庚申八小庚寅九大己未十小己丑十一大戊午十二小戊子大衍厯是年閏五月推古厯亦當閏六月杜厯置此閏于明年四月後以合于前四月之辛卯去莊四年四月閏凡三十六月其後莊九年閏八月相去僅二十八月莊十一年閏三月相去僅十八月莊十四年閏五月相去又三十八月莊十七年閏六月相去又三十七月此十四年間凡五閏皆疎數無定凖惟推勘經𫝊日月之上下而置之若按三年一閏五年再閏之例互為易置或置之年末則與經𫝊日月皆不合今姑從杜厯以俟考厯者訂焉莊七年甲午正大丁巳二小丁亥三大丙辰四小丙戌經辛卯初六日杜厯是月丁亥朔辛卯初五日閏大乙卯五小乙酉六大甲寅七大甲申八小甲寅九大癸未十小癸丑十一大壬午十二小壬子莊八年乙未正大辛巳經甲午十四日二小辛亥三大庚辰四小庚戌五大己卯六小己酉七大戊寅八小戊申九大丁丑十小丁未十一大丙子經癸未初八日十二大丙午大衍厯是年正月大壬子朔己巳日冬至經甲午在二月十一月小戊申朔經癸未在十二月莊九年丙申正小丙子二大乙巳三小乙亥四大甲辰五小甲戌六大癸卯七小癸酉經丁酉二十五日八大壬寅經庚申十九日閏小壬申九大辛丑十小辛未十一大庚子十二小庚午大衍厯是年閏三月推古厯閏二月今杜厯閏八月莊十年丁酉正大己亥二大己巳三小己亥四大戊辰五小戊戌六大丁卯七小丁酉八大丙寅九小丙申十大乙丑十一小乙未十二大甲子莊十一年戊戌正小甲午二大癸亥三小癸巳閏大壬戌四小壬辰五大辛酉經戊寅十八日六大辛卯七小辛酉八大庚寅九小庚申十大己丑十一小己未十二大戊子大衍厯是年閏十一月推古厯亦同今杜厯閏四月莊十二年己亥正小戊午二大丁亥三小丁巳四大丙戌五小丙辰六大乙酉七小乙卯八大甲申經甲午十一日九大甲寅十小甲申十一大癸丑十二小癸未大衍厯是年八月小丙辰朔經甲午在九月莊十三年庚子正大壬子二小壬午三大辛亥四小辛巳五大庚戌六小庚辰七大己酉八小己卯九大戊申十小戊寅十一大丁未十二小丁丑莊十四年辛丑正大丙午二大丙子三小丙午四大乙亥五小乙巳閏大甲戌六小甲辰經甲子二十一日七大癸酉八小癸卯九大壬申十小壬寅十一大辛未十二小辛丑大衍厯閏八月推古厯閏七月今從杜厯閏五月莊十五年壬寅莊之年史臣紀事多不載甲子正大庚午二小庚子三大己巳四小己亥五大戊辰六大戊戌七小戊辰八大丁酉九小丁卯十大丙申十一小丙寅十二大乙未莊十六年癸卯正小乙丑二大甲午三小甲子四大癸巳五小癸亥六大壬辰七小壬戌八大辛卯九大辛酉十小辛卯十一大庚申十二小庚寅莊十七年甲辰正大己未二小己丑三大戊午四小戊子五大丁巳六小丁亥閏大丙辰七小丙戌八大乙卯九小乙酉十大甲寅十一小甲申十二大癸丑大衍厯閏四月推古厯亦同今從杜厯閏六月莊十八年乙巳正大癸未二小癸丑三大壬午經日食四小壬子五大辛巳六小辛亥七大庚辰八小庚戌九大己卯十小己酉十一大戊寅十二小戊申經書春王三月日有食之不言日不言朔杜氏云官失之也穀梁云夜食也宋劉孝孫云三月不應食五月壬子朔入食限大衍厯推五月朔交分入食限三月不應食郭氏云三月不入食限五月壬子朔加時在晝交分入食限葢誤五為三按推厯者皆云壬子食而長厯四月得壬子朔葢必日食之前少置一閏而以四月為三月耳郭氏云誤五為三然五三近似而春夏不得誤也經明書春三月則非夏五月可知沈括云春秋日食三十六厯家推騐精者不過二十六衛朴得三十五獨莊十八年三月古今算不入食限閻百詩云是年乙巳嵗二月有閏三月癸未朔未初初刻合食限衞朴云不入食限者不知何説也按三十六食中有比月而食者二從無厯家推合者衛氏何以得之莊十七年巳閏十八年二月何得再閏癸未當作壬子閻説亦似有誤莊十九年丙午正大丁丑二小丁未三大丙子四大丙午五小丙子六大乙巳𫝊庚申十六日七小乙亥八大甲辰九小甲戌十大癸卯十一小癸酉十二大壬寅推古厯是年閏十二月莊二十年丁未正小壬申二大辛丑三小辛未四大庚子五小庚午六大己亥七小己巳八大戊戌九大戊辰十小戊戌十一大丁卯十二小丁酉閏大補丙寅大衍厯是年閏正月今補於此説見下按杜厯自莊十七年閏六月至莊二十四年始閏七月凡相去八十五月不應閏法疎闊如此今推勘上下日月其十九年六月内有庚申是己而下年之五月則無辛酉七月則無戊辰至二十二年月日皆不合以是知年前失一閏也豈杜厯𫝊本失之耶今于此年補一閏則皆合矣莊二十一年戊申正小丙申二大乙丑三小乙未四大甲子五小甲午經辛酉二十八日六大癸亥七小癸巳經戊戌初六日八大壬戌九小壬辰十大辛酉十一小辛卯十二大庚申莊二十二年己酉正大庚寅經癸丑二十四日二小庚申三大己丑四小己未五大戊子六小戊午七大丁亥經丙申初十日八小丁巳九大丙戌十小丙辰十一大乙酉十二小乙卯大衍厯是年閏十月古厯閏九月今置下年末大衍厯七月大戊午朔經丙申在八月莊二十三年庚戌正大甲申二小甲寅三大癸未四大癸丑五小癸未六大壬子𫝊壬申二十一日壬申見文十七年𫝊注云二十四日誤七小壬午八大辛亥九小辛巳十大庚戊十一小庚辰十二大己酉經甲寅初六日閏小己卯杜厯閏在下年七月今置此年之末莊二十四年辛亥正大戊申二小戊寅三大丁未四小丁丑五大丙午六小丙子七大乙巳八大乙亥經丁丑初三日戊寅初四日九小乙巳十大甲戌十一小甲辰十二大癸酉杜厯是年閏七月今置上年末莊二十五年壬子正小癸卯二大壬申𫝊壬戌見文十七年𫝊注云三月二十日三小壬寅四大辛未五小辛丑經癸丑十三日六大庚午經辛未朔日食七小庚子八大己巳九小己亥十大戊辰十一大戊戌十二小戊辰經六月辛未朔日有食之杜氏云辛未實七月朔置閏失所故致月錯按此年日食不獨非六月朔亦非七月朔也辛未在四月朔耳若依杜厯從隠元年前一月推至此則辛未朔即六月不知杜厯何以言七月朔也但不合于僖五年之辛亥朔及戊申朔奈何大衍厯正月小甲戌朔戊戌日冬至五月大壬申朔六月小壬寅朔經五月癸丑在此月七月大辛未朔日食郭氏亦云七月辛未朔加時在晝交分二十七日四百八十九入食限此二厯與杜厯所推畧同然自以其厯推春秋非春秋當日之本厯也莊二十六年癸丑正大丁酉二小丁卯三大丙申四小丙寅五大乙未六小乙丑七大甲午八小甲子九大癸巳十小癸亥十一大壬辰十二小壬戌經癸亥朔日食經十二月癸亥朔日有食之大衍厯同郭氏亦云是年十二月癸亥朔加時在晝交分十四日三千五百五十一入食限按癸亥在十月朔經書十二月朔疑是食二然與朔字不合若如上年辛未朔曲變之法則于此十二月即癸亥朔矣大衍厯于莊二十五年閏六月古厯亦同今杜閏不在二十五年而在二十八年三月不太疎乎宜于此年補一閏説見後莊二十七年甲寅正大辛卯二小辛酉三大庚寅四大庚申五小庚寅六大己未七小己丑八大戊午九小戊子十大丁巳十一小丁亥十二大丙辰莊二十八年乙卯正小丙戌二大乙卯三小乙酉經甲寅下月朔誤閏大甲寅四小甲申經丁未二十四日五大癸丑六小癸未七大壬子八大壬午九小壬子十大辛巳十一小辛亥十二大庚辰大衍厯是年閏二月小丙戌朔經三月甲寅在此月二十九日三月大乙卯朔經四月丁未在此月二十三日推古厯亦當閏二月按厯法也按杜厯是年閏三月葢欲合于前月之甲寅後月之丁未其法是矣然距前莊二十四年七月閏則太疎距後莊三十年二月閏則太宻似未合古法若以甲寅日為干支之誤姑闕所疑則移此閏于莊二十六年之未並移後閏于莊二十九年之末庶兩閏均停合于三年一閏之例而其中又無日月乖錯之患也况經𫝊之日杜駁甚多何獨拘此一日乎又按杜厯自此年至僖五年置閏者六皆疎宻不等如此年之三月閏去前閏四十五月莊三十年之二月閏去前閏二十四月莊三十二年之三月閏去前閏二十六月閔二年之五月閏去前閏二十七月僖元年之十一月閏去前閏十九月僖五年之十二月閏又去前閏四十九月皆不計疎宻惟推勘經𫝊日月而得之然其中無日月者甚多不知以何為據若欲盡按厯法以正之則經𫝊之干支率多不合故今姑仍其舊以俟參考又按杜厯置閏惟推勘經𫝊上下干支故疎宻不等不復依厯法愚以厯法班自天子掌之太史必有一定之法相𫝊已久豈容任意疎宻後之人當據厯以考經不必泥經而紊厯也且推勘經𫝊上下文必合前後日食以推之始為精宻至于日之干支𫝊冩數千年不無一字偶差而左氏採各國史文豈無彼此互異惟日食乃魯史所紀聖人據之直書可以考訂厯法訛謬也莊二十九年丙辰正小庚戌二大己卯三小己酉四大戊寅五小戊申六大丁丑七小丁未八大丙子九小丙午十大乙亥十一大乙巳十二小乙亥莊三十年丁巳正大甲辰二小甲戌閏大癸卯三小癸酉四大壬寅𫝊丙辰十五日五小壬申六大辛丑七小辛未八大庚子經癸亥二十四日九小庚午經庚午朔日食十大己亥十一小己巳十二大戊戌經九月庚午朔日有食之大衍授時二厯皆云十月庚午朔日食非九月也然從隠元年退一月算之則九月庚午朔日食與經合且上合于隠三年之二月己巳桓三年之七月壬辰下合于僖五年之九月戊申僖十二年之三月庚午所不合者莊二十五年之六月辛未二十六年之十二月癸亥率先兩月若曲變其法以從之則所合者又復不合未知何説也大衍厯是年閏十一月古厯同杜厯閏二月可移置上年末説見莊二十八年大衍厯八月大辛未朔經癸亥在九月莊三十一年戊午正小戊辰二大丁酉三大丁卯四小丁酉五大丙寅六小丙申七大乙丑八小乙未九大甲子十小甲午十一大癸亥十二小癸巳莊三十二年己未正大壬戌二小壬辰三大辛酉閏小辛卯四大庚申五大庚寅六小庚申七大己丑經癸巳初五日八小己未經癸亥初五日九大戊子十小戊午經己未初二日十一大丁亥十二小丁巳此年之閏可移置上年之末葢前閏皆三年此二年一閏則疎宻適均而去定閏不逺也且去後一閏不致太宻益合大衍厯七月大庚申朔經癸巳在八月大衍厯八月小庚寅朔經癸亥在九月大衍厯十月小己丑朔經己未在十一月閔元年庚申正大丙戌二小丙辰三大乙酉四小乙卯五大甲申六小甲寅經辛酉初八日七大癸未八小癸丑九大壬午十大壬子十一小壬午十二大辛亥大衍厯是年閏八月杜厯閏于下年五月大衍厯六月大乙酉朔經辛酉在七月閔二年辛酉正小辛巳二大庚戌三小庚辰四大己酉五小己卯經乙酉初七日閏大戊申六小戊寅七大丁未八小丁丑經辛丑二十四日九大丙午十小丙子十一大乙巳十二小乙亥大衍厯八月大戊申朔經辛丑在九月僖元年壬戌正大甲辰二大甲戌三小甲辰四大癸酉五小癸卯六大壬申七小壬寅經戊辰二十七日八大辛未九小辛丑十大庚午經壬午十三日十一小庚子閏大己巳十二小己亥經丁巳十九日大衍厯空按杜厯于閔二年閏五月此年又閏十一月相距僅十八月至僖五年始閏十二月相距又四十九月一太宻一太疎若稍移置之則與經𫝊日月不合矣今姑從之大衍厯七月小癸酉朔經戊辰在八月大衍厯十月大辛酉朔經壬午在十一月僖二年癸亥正大戊辰二小戊戌三大丁卯經辛巳十五日四大丁酉五小丁卯六大丙申七小丙寅八大乙未九小乙丑十大甲午十一小甲子十二大癸巳大衍厯是年閏五月僖三年甲子正小癸亥二大壬辰三小壬戌四大辛卯五小辛酉六大庚寅七小庚申八大己丑九大己未十小己丑十一大戊午十二小戊子僖四年乙丑正大丁巳二小丁亥三大丙辰四小丙戌五大乙卯六小乙酉七大甲寅八小甲申九大癸丑十小癸未十一大壬子十二小壬午𫝊戊申二十七日按古厯法以明年僖五年朔旦冬至為厯元則此年之十二月為一蔀之終餘分俱盡當為閏月今杜厯無閏不知其厯元始于何年而又云日南至為朔旦冬至厯數之所始豈以朔旦為日出之時而不始于夜半子初耶今殊不可考又按僖四年之前置閏太疎當置一閏于此年之末又按此年十二月為壬午朔三十得辛亥而𫝊以明年正月為辛亥朔與厯未合故借此年末日辛亥為明年朔旦則十二月小而正月大也詳見後十二月壬午朔月頻大故有三十今借于明年正月則十二月小而明年正二兩月皆大僖五年丙寅正大辛亥𫝊辛亥朔日南至二大辛巳三小辛亥四大庚辰五小庚戌六大己卯七小己酉八大戊寅九小戊申經戊申朔日食十大丁丑十一小丁未十二大丙子𫝊丙子朔𫝊正月辛亥朔日南至杜氏云朔旦冬至厯數之所始春秋長厯卷十
