body:
  text: 春秋長厯卷八右諭徳陳厚耀撰厯編六定元年壬辰正小乙亥𫝊辛巳初七日庚寅十六日二大甲辰三小甲戌四大癸夘五小癸酉六大壬寅經癸亥二十二日𫝊戊辰二十七日七小壬申經癸巳二十二日八大辛丑九小辛未十大庚子十一大庚午十二小庚子大衍厯是年閏八月古厯閏七月杜閏在明年定二年癸巳正大己巳二小己亥三大戊辰四小戊戌傳辛酉二十四日壬大衍厯四月大丁夘朔經五月辰在此月五大丁夘經壬辰二十六日閏小丁酉六大丙寅七小丙申八大乙丑九小乙未十大甲子十一小甲午十二大癸亥定三年甲午正小癸巳二大壬戌經辛夘三十日三大壬辰四小壬戌五大辛夘六小辛酉七大庚寅八小庚申九大己丑十小己未十一大戊子十二小戊午定四年乙未正大丁亥二小丁巳經癸巳二月癸巳陳侯吳卒杜氏云癸巳正月七日書二月從赴三大丙戌四小丙辰經庚辰二十五日五大乙酉六大乙夘七小乙酉閏大甲寅八小甲申九大癸丑十小癸未十一大壬子經庚午十九日庚辰二十九日𫝊己夘二十八日十二小壬午定五年丙申正大辛亥二大辛巳三小辛亥經辛亥朔日食四大庚辰五小庚戌六大己夘經丙申十八日七小己酉經壬子初四日八大戊寅九小戊申𫝊乙亥二十八日十大丁丑𫝊丁亥十一日己丑十三日庚寅十四日十一小丁未十二大丙子經書春王三月辛亥朔日有食之大衍厯同郭氏亦云三月辛亥朔交分十四日三百三十四分入食限定六年丁酉正小丙午經癸亥十八日二大乙亥三小乙巳四大甲戌𫝊己丑十六日五小甲辰六大癸酉七小癸夘八大壬申九小壬寅十大辛未十一小辛丑十二大庚午古厯是年閏十二月杜閏在八年二月定七年戊戌正小庚子大衍厯正月大庚子朔己巳冬至午朔三統厯正月己巳朔冬至殷厯庚二大己巳三大己亥四小己巳五大戊戌六小戊辰七大丁酉八小丁夘九大丙申十小丙寅十一大乙未𫝊戊午二十四日十二小乙丑傳己巳初五日大衍厯是年閏正月小庚午朔杜厯閏明年二月定八年己亥正大甲午二小甲子𫝊己丑二十六日辛夘二十九日閏大癸巳三小癸亥四大壬辰五大壬戌六小壬辰七大辛酉經戊辰初八日八小辛夘九大庚申十小庚寅𫝊辛夘初二日壬辰初三日癸巳初四日十一大己未十二小己丑定九年庚子正大戊午二小戊子三大丁巳四小丁亥經戊申二十二日五大丙辰六小丙戌七大乙夘八小乙酉九大甲寅十大甲申十一小甲寅十二大癸未大衍厯是年閏十月古厯閏九月杜閏明年六月定十年辛丑正小癸丑二大壬午三小壬子四大辛巳五小辛亥六大庚辰閏小庚戌此閏可置上年末七大己夘八小己酉九大戊寅十小戊申十一大丁丑十二大丁未定十一年壬寅正小丁丑二大丙午三小丙子四大乙巳五小乙亥六大甲辰七小甲戌八大癸夘九小癸酉十大壬寅十一小壬申十二大辛丑定十二年癸夘正小辛未二大庚子三小庚午四大己亥五大己巳六小己亥七大戊辰八小戊戌九大丁夘十小丁酉經癸亥二十七日十一大丙寅經丙寅朔日食閏小丙申十二大乙丑大衍厯閏七月小戊戌朔古厯閏六月經十有一月丙寅朔日有食之􅚀衍厯十月丙寅朔日食非十一月也經癸亥在九月郭氏亦云今厯推之是年十月丙寅朔加時在晝交分十四日二千六百二十二分入食限失一閏也按閏在日食後自然以十月丙寅朔為十一月也定十三年甲辰正小乙未二大甲子三小甲午四大癸亥五小癸巳六大壬戌七小壬辰八大辛酉九大辛夘十小辛酉十一大庚寅𫝊丁未十八日十二小庚申傳辛未十二日定十四年乙巳正大己丑二小己未經辛巳二十三日三大戊子四小戊午五大丁亥六小丁巳七大丙戌八小丙辰九大乙酉十小乙夘十一大甲申十二大甲寅杜厯是年閏十二月今移明年二月以均前後定十五年丙午正小甲申閏大癸丑二小癸未經辛丑十九日三大壬子四小壬午五大辛亥經辛亥即朔日壬申二十二日六小辛巳七大庚戌經壬申二十三日八小庚辰經庚辰朔日食九大己酉經丁巳初九日戊午初十日十小己夘經辛巳初三日月杜氏以經辛巳蒙上九月實十也有日而無月十一大戊申十二小戊寅經八月庚辰朔日有食之大衍厯同郭氏亦云是月庚辰朔交分十三日七千六百八十五分入食限大衍厯正月小甲申朔二十八日辛亥冬至經辛丑在此月閏三月大壬子朔五月辛亥朔八月庚辰朔九月己酉朔經辛巳在十月初三日大衍厯閏三月古厯閏二月哀元年丁未正大丁未二小丁丑三大丙午四大丙子經辛巳初六日五小丙午六大乙亥七小乙巳八大甲戌九小甲辰十大癸酉十一小癸夘十二大壬申哀二年戊申正小壬寅二大辛未經癸巳二十三日三小辛丑四大庚午經丙子初七日五小庚子六大己巳傳乙酉十七日七大己亥八小己巳經甲戌初六日九大戊戌十小戊辰十一大丁酉閏小丁夘十二大丙申大衍厯是年亦閏十一月古厯皆合哀三年己酉正小丙寅二大乙未三小乙丑四大甲午經甲午即朔日五小甲子經辛夘二十八日六大癸巳傳癸夘十一日七小癸亥經丙子十四日八大壬辰九小壬戌十大辛夘經癸夘十三日傳癸丑二十三日十一大辛酉十二小辛夘哀四年庚戌正大庚申二小庚寅經庚戌二十一日三大己未四小己丑五大戊午六小戊子經辛丑十四日七大丁巳傳庚午十四日八小丁亥經甲寅二十八日九大丙辰十小丙戌十一大乙夘十二小乙酉哀五年辛亥正大甲寅二小甲申三大癸丑四大癸未五小癸丑六大壬午七小壬子八大辛巳九小辛亥經癸酉二十三日十大庚辰閏小庚戌十一大己夘十二小己酉經書冬叔還如齊閏月葬齊景公按經閏月書于冬後上間叔還如齊一事下文無紀則閏月未知何月疑亦是閏在年末也杜閏十月未知何據大衍厯閏八月小辛巳朔經癸酉在閏月大衍厯是年閏八月古厯閏七月哀六年壬子正大戊寅二小戊申三大丁丑四小丁未五大丙子六大丙午傳戊辰二十三日七小丙子經庚寅十五日八大乙巳九小乙亥十大甲辰傳丁夘二十四日十一小甲戌十二大癸夘哀七年癸丑正小癸酉二大壬寅三小壬申四大辛丑五小辛未六大庚子七小庚午八大己亥經己酉十一日九小己巳十大戊戌十一大戊辰十二小戊戌閏大丁夘此閏可置明年哀八年甲寅正小丁酉二大丙寅三小丙申四大乙丑五小乙未六大甲子七小甲午八大癸亥九小癸巳十大壬戌十一小壬辰十二大辛酉經癸亥初三日大衍厯是年閏五月古厯閏四月杜厯閏在上年哀九年乙夘正大辛夘二小辛酉傳甲戌十四日三大庚寅四小庚申五大己丑六小己未七大戊子八小戊午九大丁亥十小丁巳十一大丙戌十二小丙辰哀十年丙辰正大乙酉二小乙夘三大甲申經戊戌十五日四小甲寅五大癸未閏大癸丑古厯閏十二月大衍厯閏明年正月則此閏可置年末六小癸未七大壬子八小壬午九大辛亥十小辛巳十一大庚戌十二小庚辰哀十一年丁巳正大己酉二小己夘三大戊申四小戊寅五大丁未經甲戌二十八日傳壬申二十五日六小丁丑七大丙午經辛酉十六日八小丙子九大乙巳十大乙亥十一小乙巳十二大甲戌大衍厯是年閏正月哀十二年戊午正小甲辰二大癸酉三小癸夘四大壬申五小壬寅經甲辰初三日六大辛未七小辛丑八大庚午九小庚子十大己巳十一小己亥十二大戊辰傳丙申二十九日傳冬十二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也杜氏云周之十二月今之十月是嵗應置閏而失不置雖十二月實今之九月司厯誤一月九月之初尚温故得有螽又曰火猶西流言未盡没知是九月釋例論之備孔氏云季孫雖聞仲尼之言猶不即改至明年十二月復螽始于十四年春置閏欲以補正時厯也傳又于十五年書閏欲明十四年之閏于法當在十二年也按自襄二十七年至此哀十二年共六十四年杜厯置閏二十三大衍厯亦置閏二十三未嘗失一閏也而十二月螽火猶西流明是天度嵗差之故閏後猶未見閏前則物候多違耳補正厯閏之説皆是臆解厯頒自天子豈季孫之所得而補哉且自哀十一年至哀十五年共五年應有兩閏殊非補一閏也哀十三年己未正大戊戌二小戊辰三大丁酉四小丁夘五大丙申六小丙寅𫝊丙子十一日乙酉二十日丙戌二十一日丁亥二十二日七大乙未𫝊辛丑初七日八小乙丑九大甲午十小甲子十一大癸巳十二小癸亥大衍厯是年閏九月古厯亦同杜閏在明年哀十四年庚申正大壬辰二小壬戌閏大辛夘此閏亦可置上年末三小辛酉四大庚寅經庚戌二十一日五大庚申經庚申朔日食十𫝊壬申十三日庚辰二一日六小庚寅傳甲午初五日七大己未八小己丑經辛丑十三日九大戊午十小戊子十一大丁巳十二小丁亥經五月庚申朔日有食之大衍厯亦同郭氏云是月庚申朔交分二十六日九千二百一分入食限郭氏云春秋二百四十二年間凡三十有七日食以授時厯推之惟襄公二十一年十月庚辰朔及二十四年八月癸巳朔不入食限蓋自有厯以來無比月而食之理其三十五食食皆在朔經或不書日不書朔公榖以為食晦二者非左氏以為史官失之者得之其間或差一月二月者蓋由古厯踈濶置閏失當之弊姜岌一行已有定説孔子作春秋但因時厯以書非大義所關故不必致詳也哀十五年辛酉正大丙辰二小丙戌三大乙夘四小乙酉五大甲寅六小甲申七大癸丑八大癸未九小癸丑十大壬午十一小壬子十二大辛巳閏小辛亥傳閏月傳冬及齊平至閏月良夫與太子入按𫝊繋閏月于冬後相隔二事疑即十二月也故杜厯從之然此年實不應閏由閏法失當之故若置之明年末則前後兩閏方均孔氏以為傳特書閏月以明十四年之閏當在十二年者亦非是哀十六年壬戌正大庚辰經己夘正月無己夘己夘在前月二十九日二小庚戌三大己夘四小己酉經己丑杜氏云四月十八日乙丑有誤無己丑己丑五月十二日日月必五大戊寅六小戊申七大丁丑八小丁未九大丙子十小丙午十一大乙亥十二大乙巳按此年己夘己丑兩日辰皆不合若移上年之閏于此年之末則皆合矣𫝊上年所書閏月或據衛事書之與魯厯不合也上年無閏則此年正月辛亥朔二十九日得己夘四月己夘朔則十一日得己丑哀十七年癸亥正小乙亥二大甲辰三小甲戌四大癸夘五小癸酉六大壬寅七小壬申𫝊己夘初八日八大辛丑九小辛未十大庚子十一小庚午𫝊辛巳十二日十二大己亥自此年至哀二十七年為左氏所附有𫝊無經所載日月甚畧杜厯及大衍厯授時厯皆無所發明今姑據古厯推之哀十八年甲子正小己巳二大戊戌三小戊辰四大丁酉五大丁夘六小丁酉七大丙寅八小丙申九大乙丑十小乙未十一大甲子十二小甲午哀十九年乙丑正大癸亥二小癸巳閏大壬戌三小壬辰四大辛酉五小辛夘六大庚申七大庚寅八小庚申九大己丑十小己未十一大戊子十二小戊午哀二十年丙寅正大丁亥二小丁巳三大丙戌四小丙辰五大乙酉六小乙夘七大甲申八小甲寅九大癸未十小癸丑十一大壬午十二大壬子哀二十一年丁夘正小壬午二大辛亥三小辛巳四大庚戌五小庚辰六大己酉七小己夘八大戊申九小戊寅十大丁未十一小丁丑閏大丙午十二小丙子哀二十二年戊辰正大乙巳二大乙亥三小乙巳四大甲戌五小甲辰六大癸酉七小癸夘八大壬申九小壬寅十大辛未十一小辛丑𫝊丁夘二十七日十二大庚午哀二十三年己巳正小庚子二大己巳三小己亥四大戊辰五小戊戌六大丁夘𫝊壬辰二十六日七大丁酉八小丁夘九大丙申十小丙寅十一大乙未十二小乙丑哀二十四年庚午正大甲午二小甲子三大癸巳四小癸亥五大壬辰六小壬戌七大辛夘八小辛酉九大庚寅十小庚申十一大己丑十二大己未閏小己丑推古厯富閏七月傳書二十四年夏四月之後别無日月至傳末書閏月公如越云云以下並無别𫝊則此閏月繋之年末可也哀二十五年辛未正大戊午二小戊子三大丁巳四小丁亥五大丙辰𫝊庚辰二十五日六小丙戌七大乙夘八小乙酉九大甲寅十小甲申十一大癸丑十二小癸未哀二十六年壬申正大壬子二大壬午三小壬子四大辛巳五小辛亥六大庚辰七小庚戌八大己夘九小己酉十大戊寅𫝊辛巳初四日十一小戊申十二大丁丑哀二十七年癸酉正小丁未二大丙子三小丙午四大乙亥𫝊己亥二十五日閏小乙巳五大甲戌六大甲辰七小甲戌八大癸夘𫝊甲戌八月無甲戌甲戌在七月初一日蓋閏在年末故以七月為八月耳九小癸酉十大壬寅十一小壬申十二大辛丑春秋長厯卷八
