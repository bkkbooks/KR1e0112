body:
  text: 春秋長厯卷四右諭徳陳厚耀撰厯編二莊二十年丁未正小癸酉二大壬寅三小壬申四大辛丑五小辛未六大庚子七小庚午八大己亥九小己巳十大戊戌十一大戊辰十二小戊戌閏大補丁夘按杜厯自莊十七年閏六月至莊二十四年始閏七月凡相去八十五月不應閏法踈濶如此今推勘上下日月其十九年六月内有庚申是已而下年之五月則無辛酉七月則無戊辰至二十二年月日皆不合以是知年前失一閏也意杜厯𫝊本失之今于此年補一閏則皆合矣莊二十一年戊申正小丁酉二大丙寅三小丙申四大乙丑五小乙未經辛酉二十七日六大甲子七小甲午經戊戌初五日八大癸亥九小癸巳十大壬戌十一小壬辰十二大辛酉莊二十二年己酉正小辛夘經癸丑二十三日二大庚申三大庚寅四小庚申五大己丑六小己未七大戊子經丙申初九日丙大衍厯七月大戊午朔經申在八月八小戊午九大丁亥十小丁巳十一大丙戊十二小丙辰大衍厯是年閏十月古厯閏九月今置下年末莊二十三年庚戌正大乙酉二小乙夘三大甲申四小甲寅五大癸未六大癸丑𫝊壬申二十日二壬申見文十七年𫝊注云十四日誤七小癸未八大壬子九小壬午十大辛亥十一小辛巳十二大庚戌經甲寅初五日閏小移庚辰杜厯閏下年七月今移至此以均前後莊二十四年辛亥正大己酉二小己夘三大戊申四小戊寅五大丁未六小丁丑七大丙午八小丙子經丁丑初二日戊寅初三日九大乙巳十大乙亥十一小乙巳十二大甲戌杜厯閏在此年七月今置上年末莊二十五年壬子正小甲辰二大癸酉𫝊壬戌見文十十七年𫝊註云莊二也十五年三月二日則三月癸夘朔三小癸夘四大壬申五小壬寅經癸丑十二日六大辛未經辛未朔日食七小辛丑八大庚午九小庚子十大己巳十一小己亥十二大戊辰經六月辛未朔日有食之杜氏云長厯推之辛未實七月朔置閏失所故致月錯孔氏云案二十四年八月丁丑夫人姜氏入從彼推之則六月辛未朔非有差錯杜云置閏失所者以二十四年八月以前誤置一閏非是八月以來始錯也按上年八月丁丑及此年五月癸丑皆非錯而次年十二月癸亥朔亦非錯則辛未實六月朔何以言實七月朔也大衍厯七月辛未朔交分入食限郭氏亦云是年七月辛未朔加時在朔交分二十七日四百八十九入食限失閏也按此二厯皆云七月日食與杜厯所推畧同然自以其厯推春秋非春秋當日之本厯也又按自桓十七年十月庚午朔日食至此年六月辛未朔日食推古厯相距三百一十七月大衍亦然但前後俱後一月而杜厯三百一十六月實少一月則知莊二十年一閏不可不補也杜不知差一閏而以六月為七月誤矣且又何以合于次年十二月癸亥朔日食也此註應削去以免後日之疑大衍厯正月小甲戌朔戊戌日冬至五月大壬申朔六月小壬寅朔經五月癸丑在此月莊二十六年癸丑正大戊戌二小戊辰三大丁酉四小丁夘五大丙申六小丙寅七大乙未八小乙丑九大甲午十小甲子十一大癸巳十二小癸亥經癸亥朔日食閏大壬辰經十二月癸亥朔日有食之大衍厯同郭氏亦云是年十二月癸亥朔加時在晝交分十四日三千五百五十一分入食限大衍厯于莊二十五年閏六月古厯亦同今杜厯于莊二十四年置一閏直至二十八年三月始復閏不太踈乎今移置此年末説見後按自前年六月辛未朔日食至此年十二月日食相距十八月古厯與大衍皆合又以此年日食下距莊三十年九月庚午朔日食大衍亦同而古厯相距四十九月大衍厯相距四十七月實差兩月下距僖五年九月戊申朔日食亦差兩月未詳何故想由月朔參差故也又以此年日食下距僖十二年三月庚午日食大衍二百四十月古厯亦同而杜厯亦同則又皆合矣此不可解之甚者莊二十七年甲寅正小壬戌二大辛夘三小辛酉四大庚寅五大庚申六小庚寅七大己未八小己丑九大戊午十小戊子十一大丁巳十二小丁亥莊二十八年乙夘正大丙辰二小丙戌三大乙夘經甲寅日誤四小乙酉經丁未二十三日五大甲寅六小甲申七大癸丑八小癸未九大壬子十大壬午十一小壬子十二大辛巳大衍厯是年閏二月小丙戌朔經三月甲寅在此月二十九日三月大乙夘朔經四月丁未在五月二十三日推古厯亦當閏二月按厯法也按杜厯是年閏三月蓋欲合于前月之甲寅後月之丁未其法是矣然距莊二十四年七月閏則太踈距後莊三十年二月閏則太宻似未合古法若以甲寅日為干支之誤姑闕所疑則移此閏于莊二十六年之末並移後閏于莊二十九年之末庶兩閏均停合于三年一閏之例而其中又無日月乖錯之患也况經傳之日杜駁甚多何獨拘此一日乎又按杜厯自此年至僖五年置閏者六皆踈宻不等如此年之閏三月去前閏四十五月莊三十年之二月閏去前閏二十四月莊三十二年之三月閏去前閏二十六月閔二年之五月閏去前閏二十七月僖元年之十一月閏去前閏十九月僖五年之十二月閏又去前閏四十九月皆不計踈宻惟推勘經𫝊日月而得之然其中無日月者甚多不知以何為據若欲盡按厯法以正之則經𫝊之干支率多不合故今即其可正者稍移置之其餘率仍其舊以俟叅考又按杜厯置閏惟推勘經𫝊上下干支故踈宻不等不復依厯法竊以厯法頒自天子掌之太史必有一定之法相傳已久豈容任意踈宻後之人當據厯以考經不必泥經而紊厯也且推勘經𫝊上下文必合前後日食以推之始為精宻至于日之干支𫝊冩千餘年不無一字偶差而左氏採各國所紀或兼用夏周二正惟日食乃魯史所載聖人據之直書而上推朔食者可以考訂厯法訛謬也莊二十九年丙辰正小辛亥二大庚辰三小庚戌四大己夘五小己酉六大戊寅七小戊申八大丁丑九小丁未十大丙子十一小丙午十二大乙亥閏大移乙巳杜厯閏在明年二月今移置此説見上莊三十年丁巳正小乙亥二大甲辰三小甲戌四大癸夘𫝊丙辰十四日五小癸酉六大壬寅七小壬申八大辛丑經癸亥二十三日亥大衍厯八月大辛未朔癸在九月九大辛未經庚午朔日食十小庚子十一小庚午十二大己亥經九月庚午朔日有食之大衍授時二厯皆云十月庚午朔日食非九月也設從隱元年退一月筭之則九月庚午朔日食與經合且上合于隱三年之二月己巳桓三年之七月壬辰下合于僖五年之九月戊申僖十二年之三月庚午所不合者莊二十五年之六月辛未二十六年之十二月癸亥其他日辰不合者亦甚多故不能曲變其法以就之也大衍厯是年閏十一月古厯亦同杜厯閏二月今移置上年末説見莊二十八年莊三十一年戊午正小己巳二大戊戌三小戊辰四大丁酉五大丁夘六小丁酉七大丙寅八小丙申九大乙丑十小乙未十一大甲子十二小甲午閏大移癸亥杜厯閏在明年三月今移置此以均前後莊三十二年己未正小癸巳二大壬戌三小壬辰四大辛酉五小辛夘六大庚申七大庚寅經癸巳初四日癸大衍厯七月大庚申朔經巳在八月八小庚申經癸亥初四日癸大衍厯八月小庚寅朔經亥在九月九大己丑十小己未經己未即朔日未大衍厯十月小己丑朔經己在十一月十一大戊子十二小戊午杜厯是年閏三月今移置上年末閔元年庚申正大丁亥二小丁巳三大丙戌四小丙辰五大乙酉六小乙夘經辛酉初七日辛大衍厯六月大乙酉朔經酉在七月七大甲申八小甲寅九大癸未十小癸丑十一大壬午十二大壬子大衍厯是年閏八月古厯閏七月杜閏下年五月閔二年辛酉正小壬午二大辛亥三小辛巳四大庚戌五小庚辰經乙酉初六日閏大己酉六小己夘七大戊申八小戊寅經辛丑二十三日丑大衍厯八月大戊申朔經辛在九月九大丁未十小丁丑十一大丙午十二小丙子僖元年壬戌正大乙巳二小乙亥三大甲辰四大甲戌五小甲辰六大癸酉七小癸夘經戊辰二十六日辰大衍厯七月小癸酉朔經戊在八月八大壬申九小壬寅十大辛未經壬午十二日午大衍厯十月小辛酉朔經壬在十一月十一小辛丑閏大庚午十二小庚子經丁巳十八日按杜厯于閔二年閏五月此年又閏十一月相距僅十八月至僖五年始閏十二月相距又四十九月一太宻一太踈若稍移置之則與經傳日月不合矣僖二年癸亥正大己巳二小己亥三大戊辰四小戊戌五大丁夘經辛巳十五日六大丁酉七小丁夘八大丙申九小丙寅十大乙未十一小乙丑十二大甲午大衍厯是年閏五月古厯閏四月杜厯不閏僖三年甲子正小甲子二大癸巳三小癸亥四大壬辰五小壬戌六大辛夘七小辛酉八大庚寅九小庚申十大己丑十一大己未十二小己丑僖四年乙丑正大戊午二小戊子三大丁巳四小丁亥五大丙辰六小丙戌七大乙夘八小乙酉九大甲寅十小甲申十一大癸丑十二小癸未𫝊戊申二十六日閏大移壬子古厯閏十二月杜厯閏明年十二月今移此大壬午按古厯法以明年僖五年正月朔旦冬至為厯元則此年之十二月為一蔀之終餘分俱盡當為閏月今杜厯不閏而反閏于五年之十二月則不論章蔀之法矣其距七年之閏又甚近相去僅二十二月殊為兩失今應移置此年之末也但自隱元年推筭至此尚有壬午朔一月未盡而傳稱明年僖五年日南至為正月辛亥朔非壬午朔則知僖四年之前必失一閏而今不知應補于何年也若從隱元年退一月以推之則此年之十二月得壬午明年正月得辛亥矣然經𫝊之日月及日食不合于杜厯者甚多又不可為之强解不知杜氏長厯如何推去奈何並無疑詞也今姑虚存壬午一月于此以俟知厯者補之其退一月厯譜以隱元年正月為庚辰朔依次推之至僖四年則十二月得壬午正月得辛亥矣其中亦有與經𫝊適合者然恐不合于杜氏長厯今别存後以備叅考僖五年丙寅正大辛亥𫝊辛亥朔日南至二大辛巳三小辛亥四大庚辰五小庚戌六大己夘七小己酉八大戊寅九小戊申經戊申朔日食十大丁丑十一小丁未十二大丙子𫝊丙子朔傳正月辛亥朔日南至杜氏云朔旦冬至厯數之所始孔氏曰厯之上元其年十一月朔旦冬至至十九年閏月盡復得十一月朔旦冬至是為一章周以建子為正月故正月朔旦冬至也又曰冬至者十一月之中氣中氣者月半之氣也月朔而已得中氣是必前月有閏閏後則中氣在朔是去年閏十二月十六日已得此年正月大雪節故此正月朔得冬至也而杜長厯僖元年閏十一月至此年閏十二月夫閏之相去厯家大率三十三月耳杜于此閏凡相去五十月葢推勘春秋日月上下置閏或稀或穊以凖春秋時法不與常厯同按漢書律厯志據此僖五年正月朔旦冬至以為一蔀之章首故考春秋厯者皆縁此溯前推後以知春秋二百四十二年之厯然即此僖五年之兩朔已不可解矣是年正月辛亥朔九月戊申朔一見𫝊一見經皆書魯事非有差也然以月法大小相間之數推之則正月朔得辛亥九月朔必得丁未而非戊申九月朔得戊申則正月朔必壬子而非辛亥若正月二月頻大三月復得辛亥則合或此兩朔之間有一月頻大者亦合然章首之年必無頻月而大者不知杜編長厯何以於此並無疑詞也因思古厯家最忌蔀首正月小唐人猶有此説故借前蔀末閏月大之三十日入正月朔日則蔀首正月大是以至朔分齊之末日為蔀首至朔之始日也依次推之則僖五年之朔始合終春秋之世經𫝊朔日合者共二十有餘稍不致紊然其不合者亦多差或一二日疑是閏法乖次之故耳大衍厯正月小癸未朔二十九日辛亥冬至閏正月大壬子朔又按先儒皆以此月為朔旦冬至謂初一日夜半子初冬至也然𫝊亦無明文止言南至或是朔冬至而非朔旦耳大衍厯推春秋亦未以辛亥為朔旦也經九月戊申朔日有食之大衍授時二厯俱畧去此日食未詳何説杜厯此年閏十二月又於僖七年十一月置一閏以合于𫝊又推九年日月不合乃於八年十一月又置一閏是四年之間前後已三閏也有是厯乎夫僖七年之閏見于𫝊文不可易也明年復閏以强合于日月則過矣莫若並去前後兩閏止存七年𫝊文一閏而上下經𫝊日月亦無不合其僖五年以前置閏太踈亦宜按章法移之也僖六年丁夘正小丙午二大乙亥三小乙巳四大甲戌五大甲辰六小甲戌七大癸夘八小癸酉九大壬寅十小壬申十一大辛丑十二小辛未僖七年戊辰正大庚子二小庚午三大己亥四小己巳五大戊戌六小戊辰七大丁酉八小丁夘九大丙申十大丙寅十一小丙申十二大乙丑閏小乙未𫝊閏月傳閏月惠王崩在年末上文無月杜厯置閏于十一月今置十二月後按閏月之見經𫝊者十而多在年末惟文元年閏三月昭二十年閏八月其餘八閏皆在年末成十七年襄九年昭二十二年閏十二月𫝊有明文其僖七年及文六年哀五年哀十五年二十四年或繋閏于冬後或雖不繫冬而下文亦無日月疑亦閏十二月也竊意春秋時拘三年一閏之例閏則置之年末其或多差則又補一閏于中以合一章七閏之法故秦漢時閏皆在後九月至太初改厯始正之葢此法自春秋時已然但不知始于何王之年也僖八年己巳正大甲子二小甲午三大癸亥四小癸巳五大壬戌六小壬辰七大辛酉八小辛夘九大庚申十小庚寅十一大己未十二小己丑經丁未十九日杜厯是年閏十一月今去之説見上僖五年僖九年庚午正小己未二大戊子三小戊午經丁丑二十日四大丁亥下二大月移于此五大丁巳六小丁亥七大丙辰經乙酉三十日上杜厯以乙酉在八月未去年兩閏也八小丙戌九大乙夘經甲子初十日戊辰十四日十小乙酉十一大甲寅十二小甲申杜氏云九月甲子十一日戊辰十五日錯書甲子在戊辰後按去上年兩閏則九月乙夘朔甲子初十日戊辰十四日僖十年辛未正大癸丑二小癸未三大壬子四小壬午五大辛亥六小辛巳七大庚戌八小庚辰九大己酉十小己夘十一大戊申十二小戊寅閏大丁未大衍厯閏六月古厯亦同今置年末僖十一年壬申正小丁丑二大丙午三小丙子四大乙巳五小乙亥六大甲辰七小甲戌八大癸夘九大癸酉十小癸夘十一大壬申十二小壬寅僖十二年癸酉正大辛未二小辛丑三大庚午經庚午日食四小庚子五大己巳六小己亥七大戊辰八小戊戌九大丁夘十小丁酉十一大丙寅十二大丙申經丁丑杜氏云丁丑在十二月十二日閏小丙寅經三月庚午日有食之杜氏云不書朔官失之姜氏云三月朔交不應食在誤條其五月庚午朔去交分入食限大衍厯同郭氏亦云五月庚午朔加時在晝去交分二十六日五千一百九十二入食限蓋五誤為三按三月得庚午朔與經合而姜氏諸人所推皆云日食在五月必其閏法不與春秋同也又按僖五年九月戊申朔日食至此年三月庚午日食大衍相距八十月杜厯相距八十二月實多兩月今去僖五年末之一閏又置此年二月之閏於年末則前後兩日食皆合與大衍同然大衍又云日食在五月郭氏又云誤五為三則三月之日食或在五月初二日蓋五月己巳朔二日得庚午故不書朔也大衍厯是年無閏杜厯閏二月今置年末僖十三年甲戌正大乙未二小乙丑三大甲午四小甲子五大癸巳六小癸亥七大壬辰八小壬戌九大辛夘十小辛酉十一大庚寅十二小庚申大衍厯閏二月今在上年末僖十四年乙亥正大己丑二小己未三大戊子四大戊午五小戊子六大丁巳七小丁亥八大丙辰經辛夘大衍厯八月小丁巳朔經辛夘在九月九小丙戌十大乙夘十一小乙酉十二大甲寅下月二大移于此閏大補甲申按杜厯自僖十二年閏二月至僖十七年始閏十二月相距七十一月似太踈今補一閏于中在此年之末而前後兩日食皆合則杜本或有所遺也僖十五年丙子正小甲寅二大癸未三小癸丑四大壬午五大壬子經五月日食六小壬午七大辛亥八小辛巳九大庚戌經己夘晦𫝊壬戌十三日十小庚辰十一大己酉經壬戌十四日𫝊丁丑二十九日十二小己夘經夏五月日有食之左氏云不書朔不書日官失之也大衍厯推四月癸丑朔去交分入食限郭氏亦云是年四月癸丑朔去交分一日一千三百一十六入食限按五月壬子朔初二日得癸丑蓋食二日也故不書朔不書日推厯者皆云在四月則閏有所移耳大衍厯四月大癸丑朔日食九月小辛巳朔經己夘晦在十月閏十月庚辰朔推古厯亦當閏十一月杜厯無閏僖十六年丁丑正小戊申經戊申朔二大丁丑三小丁未經壬申二十六日四大丙子經丙申二十一日五小丙午六大乙亥七小乙巳經甲子二十日八大甲戌九小甲辰十大癸酉十一大癸夘𫝊乙夘十三日十二小癸酉僖十七年戊寅正大壬寅二小壬申三大辛丑四小辛未五大庚子六小庚午七大己亥八小己巳九大戊戌十小戊辰𫝊乙亥初八日十一大丁酉十二小丁夘經乙亥初九日𫝊辛巳十五日閏大丙申大衍厯是年無閏僖十八年己夘正小丙寅二大乙未三大乙丑四小乙未五大甲子經戊寅十五日戊大衍厯五月大乙未朔經寅在六月六小甲午七大癸亥八小癸巳經丁亥杜氏云八月無丁亥丁亥在七月二十四日或九月二十五日九大壬戌十小壬辰十一大辛酉十二小辛夘大衍厯是年閏七月甲子朔經丁亥二十四日僖十九年庚辰正大庚申二小庚寅三大己未四小己丑五大戊午六大戊子經己酉二十日七小戊午八大丁亥九小丁巳十大丙戌十一小丙辰十二大乙酉僖二十年辛巳正小乙夘二大甲申三小甲寅四大癸未五小癸丑經乙巳乙當作己十七日在大衍厯五月大癸丑朔經乙巳六月六大壬午七小壬子八大辛巳九小辛亥十大庚辰十一大庚戌十二小庚辰閏大己酉杜厯閏二月今置年末以均後閏也僖二十一年壬午正小己夘二大戊申三小戊寅四大丁未五小丁丑六大丙午七小丙子八大乙巳九小乙亥十大甲辰十一小甲戌十二大癸夘經癸丑十一日大衍厯是年閏四月推古厯亦同杜厯不閏僖二十二年癸未正大癸酉二小癸夘三大壬申四小壬寅五大辛未六小辛丑七大庚午八小庚子經丁未初八日九大己巳下二月大移于此十大己亥十一小己巳經己巳朔丑𫝊丙子初八日丁初九日十二大戊戌春秋長厯卷四
