body:
  text: 春秋長歷桓十七年冬十月朔日有食之傳曰冬十月朔日有食之不書日官失之也天子有日官諸侯有日御日官居卿以底日禮也日御不失日以授百官於朝莊二十五年夏六月辛未朔日有食之鼓用牲於社傳曰夏六月辛未朔日有食之鼓用牲於社非常也唯正月之朔慝未作於是乎用幣於社伐鼓於朝僖十五年夏五月日有食之傳曰夏五月日有食之不書朔與日官失之也文元年二月癸亥日有食之傳曰於是閏三月非禮也先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖閏當在僖公末年十五年夏六月辛丑朔日有食之鼓用牲於社傳曰六月辛丑朔日有食之鼓用牲於社非禮也日有食之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝以昭事神訓民事君示有等威古之道也襄二十七年冬十有二月乙亥朔日有食之傳曰十二月乙亥日有食之辰在申司歷過也再失閏矣昭十七年夏六月甲戌朔日有食之傳曰夏六月甲戌朔日有食之祝史請所用幣昭子曰日有食之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝禮也平子禦之曰唯正月朔慝未作日有食之於是有伐鼓用幣其餘則否太史曰在此月也日過分而未至三辰有災於是百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書曰辰不集于房瞽奏鼓嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏平子弗從昭子退曰夫子將有異志不君君矣哀十二年冬十二月螽傳曰冬十二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司歷過也歷見經傳七百七十九傳發有八釋例曰書稱朞三百有六旬有六日以閏月定四時成歲允釐百工庶績咸熙是以天子必置日官諸侯置日御世修其業以攷其術舉全數而言故曰六日其實五日四分日之一日一日行一度而月行十三度十九分度之七有奇日官當會集此之遲速以考成晦朔錯綜以設閏月閏月無中氣而北斗斜指兩辰之間所以異於佗月積此以相通四時八節無違乃得成歲其微密至矣得其精微以合天道則事敘而不悖故傳曰閏以正時時以作事事以厚生生民之道於是乎在然陰陽之運隨動而差差而不已遂與歷錯故仲尼丘明每於朔閏發文蓋矯正得失因以宣明歷數也桓十七年日有食之得朔而史闕其日僖十五年日食亦得朔而史闕其朔與日故傳因其得失並起時史之謬兼以明其餘日食或歷失其正也莊二十五年經書六月辛未朔日有食之鼓用牲於社周之六月夏之四月所謂正陽之月也而歷數誤實是七月朔非六月故傳曰非常也唯正月之朔慝未作日有食之於是乎用幣於社伐鼓於朝明此食非用幣伐鼓常月因變而起歷誤也文十五年經文皆同而更復發傳曰非禮明前傳欲以審正陽之月後傳發例以明諸侯之禮也此乃聖賢之微旨而先儒所未喻也昭十七年夏六月日食而平子言非正陽之月以誣一朝近於指鹿為馬故傳曰言不君君且因以明此月為得天正月也劉子駿造三統歷以修春秋日有食之有甲乙者三十四而三統歷唯得一日食歷術比諸家既最疏又六千餘歲輒益一日凡歲當累日為次而無故益之此不可行之甚者班固前代名儒而謂之最密非徒班固也自古已來諸論春秋者多違謬或造家術或用黃帝已來諸歷以推經傳朔日皆不諧合日食於朔此乃天驗經傳又書其朔日食可謂得天而劉賈諸儒說皆以為月二日或三日並違聖人明文其弊在於守一元不與天消息也余感春秋之事嘗著歷論極言歷之通理其大指有云天行不息日月星辰各運其舍皆動物也物動則不一雖行度大量可得而限累日為月累月為歲以新故相考不得不有毫毛之差此自然理也故春秋日有頻月而食者有曠歲而不食者理不得一而算守恒數故歷無有不差失也始失於毫毛尚來未可覺積而成多以失弦望朔晦則不得不改憲以順之書所謂欽若昊天歷象日月星辰易所為治歷明時言當順天以求合非為合以驗天也推此論之春秋二百餘年其治歷通變多矣雖術數絕滅還尋經傳微旨大量可知時之違謬則經傳有驗學者故當曲修經傳月日日食以考晦朔以推時驗而見皆不然各據其學以推春秋此無異度已之跡而欲削佗人之足也余為歷論之後至咸寧中有善算者李修夏顯依歷體為術名乾度歷表上朝廷其術合日行四分之數而微增月行用三百歲改憲之章二元相推七十餘歲承以強弱強弱之差蓋少而適足以遠通盈縮時尚書史官以乾度歷與泰始歷參校古今記注乾度歷殊勝今其術具存時又并考古今十歷以驗春秋知三統歷之最疏也今具列其得失之數又據經傳微旨考日辰朔晦以相發明為經傳長歷如左諸經傳證據及失閏違時文字謬誤皆甄發之雖未必其得天蓋是春秋當時之歷也學者覽焉大凡經傳有七百七十九日三百九十三日經三百八十六日傳其三十七日食三無甲乙黃帝歷得四百六十六日一日食失三百一十三日三十六日食三無甲乙顓頊歷得五百九日八日食失二百七十日二十九日食二無甲乙夏歷得五百三十六日十四日食失二百四十三日二十三日食三無甲乙真夏歷得四百六十六日一日食失三百一十三日三十六日食三無甲乙殷歷得五百三日十三日食失二百七十六日二十四日食三無甲乙周歷得五百六日十三日食失二百七十三日二十四日食三無甲乙真周歷得四百八十五日一日食失二百九十四日三十六日食三無甲乙魯歷得五百二十九日十三日食失二百五十日二十四日食三無甲乙三統歷得四百八十四日一日食失二百九十五日三十六日食三無甲乙乾象歷得四百九十五日七日食失二百八十四日三十六日食三無甲乙泰始歷得五百一十日十九日食失二百六十九日二十八日食三無甲乙乾度歷得五百三十八日十九日食失二百四十一日十八日食三無甲乙今長歷得七百四十六日三十三日食失三十三日經傳日月誤四日食三無甲乙漢末宋仲子集十歷以考春秋案其夏周歷術數皆與藝文志所記不同故更其名為真夏真周歷也經傳長歷正月二月三月四月五月六月七月八月九月十月十一月十二月閏月隱公元年己未辛巳小庚戌大庚辰小巳酉大己卯小戊申大戊寅小丁未大丁丑小丙午大丙子大丙午小五月辛丑二十三日十月庚申十五日二年庚申乙亥大乙巳小甲戌大甲辰小癸酉大癸卯小壬申大壬寅小辛未大辛丑小庚午大庚子小閏己巳大八月庚辰八月無庚辰七月九日有庚辰日月必有誤十二月乙卯十六日三年辛酉己亥大己巳小戊戌大戊辰小丁酉大丁卯小丙申大丙寅小乙未大乙丑大甲午大甲子小二月己巳日食一日三月庚戌十三日壬戌二十五日四月辛卯二十四日也八月庚辰十五日冬庚戌十二月無庚戌十一月十七日也十二月癸未二十日四年壬戌癸巳大癸亥小壬辰大壬戌小辛卯大辛酉大辛卯小庚申大庚寅小己未大己丑小戊午大戊申衛州吁弒其君完三月十七日也有日而無月也周桓王元年五年癸亥戊子小丁巳大丁亥小丙辰大丙戌小乙卯大乙酉小甲寅大甲申小癸丑大癸未小壬子大閏壬午大十二月辛巳二十九日六年甲子壬子小辛巳大辛亥小庚辰大庚戌小己卯大己酉小戊寅大戊申小丁丑大丁未大丁丑小五月庚申十一日辛酉十二日七年乙丑丙午大丙子小乙巳大乙亥小甲辰大甲戌小癸卯大癸酉小壬寅大壬申小辛丑大辛未小閏庚子大七月庚申十八日十二月壬申二日辛巳十一日八年丙寅庚午大庚子小己巳大己亥小戊辰大戊戌小丁卯大丁酉小丙寅大丙申小乙丑大乙未小三月庚寅二十二日四月甲辰六日辛亥十三日甲寅十六日六月己亥二日辛亥十四日七月庚午四日八月丙戌七月有庚午丙戌誤九月有辛卯二十六日八月不得有丙戌丙戍誤也九月辛卯二十六日九年丁卯甲子大甲午小癸亥大癸巳大癸亥小壬辰大壬戌小辛卯大辛酉小庚寅大閏庚申小己巳丑大己未小三月癸酉十一日庚辰十八日十一月甲寅二十六日十年戊辰戊子大戊午小丁亥大丁巳小丙戌大丙辰大丙戌小乙卯大乙酉小甲寅大甲申小癸丑大正月癸丑二十六日六月戊申六月無戊申五月二十三日也上有五月則誤在日壬戌七日庚午十五日辛未十六日庚辰二十五日辛巳二十六日七月庚寅五日八月壬戌八日癸亥九日九月戊寅九月無戊寅八月二十四日也上有八月下有冬則誤在日也十月壬午二十九日十一年己巳癸未小壬子大壬午小辛亥小辛巳小庚戌大庚辰小巳酉大巳卯小戊申大戊寅大戊申小五月甲辰二十四日七月庚辰一日壬午三日十月壬戌十五日十一月壬辰十五日桓公元年庚午丁丑大丁未小丙子大丙午小乙亥大乙巳小甲戌大甲辰小癸酉大癸卯小壬申大壬寅小閏辛未大四月丁未二日二年辛未辛丑小庚午大庚子大庚午小己亥大己巳小戊戌大戊辰小丁酉大丁卯小丙申大丙寅小正月戊申八日戊申納於太廟五月十日也有日而無月也三年壬申乙未大乙丑小甲午大甲子小癸巳大癸亥小壬辰大壬戌大壬辰小辛酉大辛卯小庚申大七月壬辰朔日有食之既一日四年癸酉庚寅小己未大己丑小戊午大戊子小丁巳大丁亥小丙辰大丙戌小乙卯大乙酉小甲寅大五年甲戌甲申大閏甲寅小癸未大癸丑小壬午大壬子小辛巳大辛亥小庚辰大庚戌大庚辰小己酉小戊寅大正月甲戌四年十二月二十一日也書於正月從赴己丑六日六年乙亥戊申小丁丑大丁未大丁丑小丙午大丙子小乙巳大乙亥小甲辰大甲戌小癸卯大癸酉小八月壬午八日九月丁卯二十四日七年丙子壬寅大壬申小辛丑大辛未小庚子大庚午小己亥大巳巳大巳亥小戊辰大戊戌小丁卯大閏丁酉小邢云此不合有閏若來年五月不得有丁丑二月己亥二十八日八年丁丑丙寅大丙申小乙丑大乙未小甲子大甲午小癸亥大癸巳小壬戌大壬辰大壬戌小辛卯大正月己卯十四日五月丁丑十四日九年戊寅辛酉小庚寅大庚申小己丑大己未小戊子大戊午小丁亥大丁巳小丙戌大丙辰小乙酉大十年己卯乙卯大乙酉小甲寅大甲申小癸丑大癸未小壬子大壬午小辛亥大辛巳小庚戌大庚辰小正月庚申六日十二月丙午二十七日十一年庚辰己酉大閏己卯小戊申大戊寅小丁未大丁丑大丁未小丙子大丙午小乙亥大乙巳小甲戌大甲辰小五月癸未七日九月丁亥十三日己亥二十五日十二年辛巳癸酉大癸卯小壬申大壬寅小辛未大辛丑小庚午大庚子大庚午小己亥大己巳小戊戌大六月壬寅二日七月丁亥十八日八月壬辰七月二十三日書八月從赴也十一月丙戌十八日十二月丁未十日十三年壬午戊辰小閏丁酉大丁卯小丙申大丙寅小乙未大乙丑小甲午大甲子小癸巳大癸亥小壬辰大壬戌大二月己巳三日十四年癸未壬辰小辛酉大辛卯小庚申大庚寅小己未大己丑小戊午大戊子小丁巳大丁亥小丙辰大八月壬申十五日乙亥十八日十二月丁巳二日十五年甲申丙戌小乙卯大乙酉大乙卯小甲申大甲寅小癸未大癸丑小壬午大壬子小辛巳大辛亥小三月乙未十一日四月己巳十五日六月乙亥二十二日十六年乙酉庚辰大庚戌小己卯大己酉小戊寅大戊申大閏戊寅小丁未大丁丑小丙午大丙子小乙巳大乙亥小經言冬城向十有一月衛侯朔出奔齊傳曰冬城向書時也學者疑於冬城向在十一月上有十月而傳云書時今推校閏在六月則月卻而